<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impostor Game // HUD Terminal</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #03030a;
      background-image: 
        linear-gradient(rgba(18, 16, 36, 0.6) 1px, transparent 1px),
        linear-gradient(90deg, rgba(18, 16, 36, 0.6) 1px, transparent 1px);
      background-size: 20px 20px;
      position: relative;
      overflow-x: hidden;
    }
    
    /* Futuristic Matrix Radar Scanline overlay */
    body::before {
      content: " ";
      display: block;
      position: fixed;
      top: 0; left: 0; bottom: 0; right: 0;
      background: linear-gradient(rgba(18, 16, 36, 0) 50%, rgba(0, 0, 0, 0.25) 50%), linear-gradient(90deg, rgba(255, 0, 0, 0.06), rgba(0, 255, 0, 0.02), rgba(0, 0, 255, 0.06));
      z-index: 99999;
      opacity: 0.4;
      pointer-events: none;
      background-size: 100% 4px, 6px 100%;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }
    ::-webkit-scrollbar-track {
      background: #050510;
    }
    ::-webkit-scrollbar-thumb {
      background: #312e81;
      border-radius: 2px;
    }

    /* Dramatic Entry Animation for Answers */
    @keyframes dramaticReveal {
      0% {
        opacity: 0;
        transform: scale(0.9) translateY(30px);
        filter: blur(15px);
      }
      50% {
        filter: blur(2px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
        box-shadow: 0 0 25px rgba(99, 102, 241, 0.35);
      }
    }

    /* System Status Terminal Blinking */
    @keyframes blink {
      0%, 100% { opacity: 1; filter: drop-shadow(0 0 8px #6366f1); }
      50% { opacity: 0.4; filter: drop-shadow(0 0 1px #6366f1); }
    }

    .dramatic-card {
      animation: dramaticReveal 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    }

    .status-blink {
      animation: blink 2s infinite ease-in-out;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ── Shared Network Storage for Multiplayer ───────────────────────────────
    window.storage = {
      get: async (key) => {
        try {
          const res = await fetch('/api/get', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key })
          });
          return await res.json(); 
        } catch (e) {
          console.error("Error fetching state:", e);
          return null;
        }
      },
      set: async (key, val) => {
        try {
          const res = await fetch('/api/set', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key, value: val })
          });
          const data = await res.json();
          return data.success;
        } catch (e) {
          console.error("Error updating state:", e);
          return false;
        }
      }
    };

    const DEFAULT_GROUPS = [
      {
        id: 1,
        questions: [
          "What time do you think is optimal for going to sleep?",
          "What time do you eat dinner?"
        ]
      },
      {
        id: 2,
        questions: [
          "What is the ideal temperature (Celsius)?",
          "What temperature is too hot?",
          "What is the oldest person you would date?",
          "At what age should it be socially looked down upon to be unemployed?"
        ]
      },
      {
        id: 3,
        questions: [
          "How much time do you spend on your screen per day excluding school?",
          "How much time do you spend exercising per day?"
        ]
      },
      {
        id: 4,
        questions: [
          "What is the ugliest block in Minecraft?",
          "What block do you use the most in Minecraft?"
        ]
      },
      {
        id: 5,
        questions: [
          "At what age did you first get a smartphone?",
          "At what age did you learn how to tie your shoes?"
        ]
      },
      {
        id: 6,
        questions: [
          "What language would you want to know how to speak (you don’t have to learn it)?",
          "What language would you never want to learn?",
          "What is the most beautiful language?",
          "What is the ugliest language?"
        ]
      },
      {
        id: 7,
        questions: [
          "What country is on your bucket list?",
          "What country would you never want to visit?",
          "What country would you never want to go back to?",
          "What country has the meanest people?",
          "What country has the hottest women?",
          "What country has the most beautiful scenery?",
          "What country has a bad future?",
          "What country generally has the best Eurovision entries?"
        ]
      },
      {
        id: 8,
        questions: [
          "What is the best biome in Minecraft?",
          "What is the ugliest biome in Minecraft?"
        ]
      },
      {
        id: 9,
        questions: [
          "What is the most nostalgic song?",
          "What song is overrated?",
          "What song do you listen to the most?",
          "What is the worst song of all time?",
          "What song is overhated?",
          "What is the most annoying internet song?"
        ]
      },
      {
        id: 10,
        questions: [
          "Who was the most memorable person from Ressu middle school (not one of us)?",
          "Who was the most studious person from Ressu middle school?",
          "Who was the least desirable person to hang out with from Ressu middle school?"
        ]
      },
      {
        id: 11,
        questions: [
          "How much money for you to eat 1 glass of Sushnevningiluzuzombuzva?",
          "What is the most money you would spend on a wedding?",
          "What yearly income should be “middle class” in a developed country?",
          "What is the most you would pay for university (per year)?",
          "What is the most money you would spend on a car?"
        ]
      },
      {
        id: 12,
        questions: [
          "What airline is the best (price, quality etc.)?",
          "What airline is the worst?",
          "What airline is the most luxurious?",
          "What airline do you use the most often?"
        ]
      },
      {
        id: 13,
        questions: [
          "What is the most boring subject?",
          "What subject had the worst teacher in Ressu middle school?",
          "What is the most fun subject?",
          "What is the easiest subject?",
          "What is the hardest subject?",
          "What is the most useless subject?"
        ]
      },
      {
        id: 14,
        questions: [
          "What is the best car?",
          "What is the worst car?"
        ]
      }
    ];

    let uid = DEFAULT_GROUPS.length + 1;
    const genCode = () => Math.random().toString(36).slice(2, 6).toUpperCase();

    // ── Cyberpunk / Sci-Fi Terminal Color Palette ─────────────────────────────────
    const C = {
      bg:"#050512", bg2:"rgba(13, 13, 33, 0.75)", bg3:"#020208",
      ind:"#6366f1", ind2:"#4f46e5", ind3:"rgba(30, 27, 75, 0.5)",
      grn:"#10b981", red:"#ef4444", ylw:"#f59e0b", cyan:"#06b6d4",
      txt:"#f8fafc", txt2:"#cbd5e1", txt3:"#94a3b8", txt4:"#475569",
      bdr:"#1e1b4b", bdr2:"#312e81", bdrGlow:"rgba(99, 102, 241, 0.2)"
    };
    const page = { minHeight:"100vh", background:"transparent", color:C.txt, padding:"2rem 1.5rem", maxWidth:"500px", margin:"0 auto", fontFamily:"ui-monospace, 'Cascadia Code', 'Source Code Pro', Menlo, monospace", boxSizing:"border-box" };
    const ctr  = { ...page, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", maxWidth:"100vw", textAlign:"center" };
    const btn  = (on=true, bg=C.ind2) => ({ width:"100%", background:on?bg:"#0f172a", border:on?`1px solid ${C.cyan}`:`1px solid ${C.txt4}`, borderRadius:"0.35rem", padding:"1.1rem", color:on?C.txt:C.txt3, fontWeight:"700", fontSize:"0.95rem", letterSpacing:"0.08em", textTransform:"uppercase", cursor:on?"pointer":"not-allowed", opacity:on?1:0.4, boxShadow:on?`0 0 12px ${bg}aa`: "none", transition:"all 0.2s ease" });
    const inp  = { width:"100%", background:"#02020a", border:`1px solid ${C.bdr2}`, borderRadius:"0.35rem", padding:"1rem", color:C.cyan, fontSize:"1rem", fontFamily:"inherit", outline:"none", boxSizing:"border-box", boxShadow:`inset 0 0 8px rgba(0,0,0,0.8)` };
    const card = (bdr=C.bdr2, bg=C.bg2) => ({ background:bg, border:`1px solid ${bdr}`, borderRadius:"0.5rem", padding:"1.25rem", backdropFilter:"blur(8px)", boxShadow:`0 4px 20px rgba(0,0,0,0.5), 0 0 1px ${bdr}` });
    const lbl  = { fontSize:"0.75rem", textTransform:"uppercase", letterSpacing:"0.15em", color:C.cyan, marginBottom:"0.5rem", display:"block", fontWeight:"bold" };

    function Chip({ name, done, isMe }) {
      return (
        <span style={{ background:"#050515", border:`1px solid ${done ? C.grn : isMe ? C.cyan : C.bdr2}`, borderRadius:"0.25rem", padding:"0.4rem 0.8rem", fontSize:"0.75rem", color:done ? C.grn : isMe ? C.cyan : C.txt3, boxShadow: done ? `0 0 8px ${C.grn}33` : "none" }}>
          [{done ? "● ONLINE" : "○ SYNCING"}] {name}{isMe ? " (YOU)" : ""}
        </span>
      );
    }

    function WaitCard({ host }) {
      return (
        <div style={{ ...card(C.bdr2), textAlign:"center", padding:"1.5rem" }} className="status-blink">
          <p style={{ color:C.txt3, margin:0, fontSize:"0.85rem", letterSpacing:"0.1em" }}>⚡ AWAITING HOST SELECTION: <strong style={{ color:C.cyan }}>{host?.toUpperCase()}</strong>…</p>
        </div>
      );
    }

    function App() {
      const [scr, setScr]           = useState("landing");
      const [myName, setMyName]     = useState("");
      const [roomCode, setRoomCode] = useState("");
      const [isHost, setIsHost]     = useState(false);
      const [gs, setGs]             = useState(null);

      // per-round local
      const [myAns, setMyAns]   = useState("");
      const [myVote, setMyVote] = useState("");
      const [submitted, setSub] = useState(false);
      const [voted, setVoted]   = useState(false);
      const [timeLeft, setTimeLeft] = useState(15);

      // forms
      const [hostName, setHostName] = useState("");
      const [joinName, setJoinName] = useState("");
      const [joinCode, setJoinCode] = useState("");
      const [groups, setGroups]     = useState(DEFAULT_GROUPS);
      const [showGF, setShowGF]     = useState(false);
      const [customQuestions, setCustomQuestions] = useState("");
      const [err, setErr]           = useState("");

      // ── Poll ──────────────────────────────────────────────────────────────────
      useEffect(() => {
        if (!roomCode || scr !== "game") return;
        const poll = async () => {
          try {
            const r = await window.storage.get(`room:${roomCode}`);
            if (r && r.value) setGs(JSON.parse(r.value));
          } catch {}
        };
        poll();
        const t = setInterval(poll, 1500);
        return () => clearInterval(t);
      }, [roomCode, scr]);

      // Local countdown loop for the Voting phase timer
      useEffect(() => {
        if (!gs || gs.phase !== "voting" || !gs.timerEnd) return;
        
        const interval = setInterval(() => {
          const now = Date.now();
          const rem = Math.max(0, Math.ceil((gs.timerEnd - now) / 1000));
          setTimeLeft(rem);

          if (rem <= 0) {
            clearInterval(interval);
            update({ phase: "results" });
          }
        }, 200);

        return () => clearInterval(interval);
      }, [gs?.phase, gs?.timerEnd]);

      // reset local state on phase change
      useEffect(() => {
        if (!gs || !myName) return;
        if (gs.phase === "answering") {
          if (gs.answers[myName] != null) setSub(true);
          else { setSub(false); setMyAns(""); }
        }
        if (gs.phase === "voting") {
          if (gs.votes[myName] != null) setVoted(true);
          else { setVoted(false); setMyVote(""); }
        }
      }, [gs?.phase, myName]);

      // ── Storage update ────────────────────────────────────────────────────────
      const update = useCallback(async (fn) => {
        try {
          const r = await window.storage.get(`room:${roomCode}`);
          if (!r || !r.value) return;
          const cur  = JSON.parse(r.value);
          const next = typeof fn === "function" ? fn(cur) : { ...cur, ...fn };
          await window.storage.set(`room:${roomCode}`, JSON.stringify(next));
          setGs(next);
        } catch (e) { console.error(e); }
      }, [roomCode]);

      // ── Handlers ──────────────────────────────────────────────────────────────
      const createRoom = async () => {
        if (!hostName.trim() || groups.length === 0) return;
        const code = genCode();
        const state = { phase:"lobby", players:[hostName.trim()], host:hostName.trim(), impIdx:null, crewQ:"", impQ:"", answers:{}, votes:{}, qGroups:groups, revealIndex:0, readyPlayers:[] };
        const ok = await window.storage.set(`room:${code}`, JSON.stringify(state));
        if (ok) {
          setMyName(hostName.trim()); setRoomCode(code); setIsHost(true); setGs(state); setScr("game");
        }
      };

      const joinRoom = async () => {
        const name = joinName.trim(), code = joinCode.trim().toUpperCase();
        if (!name || code.length !== 4) return;
        try {
          const r = await window.storage.get(`room:${code}`);
          if (!r || !r.value) { setErr("INVALID SECTOR CODE."); return; }
          const state = JSON.parse(r.value);
          if (state.phase !== "lobby" && !state.players.includes(name)) { setErr("TRANSMISSION CLOSED."); return; }
          let next = state;
          if (!state.players.includes(name)) {
            next = { ...state, players:[...state.players, name] };
            await window.storage.set(`room:${code}`, JSON.stringify(next));
          }
          setMyName(name); setRoomCode(code); setIsHost(state.host === name); setGs(next); setScr("game");
        } catch { setErr("GRID CONGESTION. RETRY."); }
      };

      const startGame = async () => {
        const players = gs.players;
        const impIdx  = Math.floor(Math.random() * players.length);
        const targetGroup = gs.qGroups[Math.floor(Math.random() * gs.qGroups.length)];
        const shuffled = [...targetGroup.questions].sort(() => Math.random() - 0.5);
        const crewQ = shuffled[0] || "Answer honestly.";
        const impQ  = shuffled[1] || shuffled[0] || "Answer honestly.";

        const answers = Object.fromEntries(players.map(p => [p, null]));
        await update({ phase:"answering", impIdx, crewQ, impQ, answers, votes:{}, revealIndex:0, readyPlayers:[] });
        setSub(false); setMyAns("");
      };

      const submitAnswer = async () => {
        if (!myAns.trim()) return;
        await update(s => ({ ...s, answers:{ ...s.answers, [myName]:myAns.trim() } }));
        setSub(true);
      };

      const handleReadyToVote = async () => {
        if (gs.readyPlayers.includes(myName)) return;
        
        await update(s => {
          const updatedReady = [...s.readyPlayers, myName];
          const threshold = (2 / 3) * s.players.length;
          
          if (updatedReady.length >= threshold) {
            const votes = Object.fromEntries(s.players.map(p => [p, null]));
            return {
              ...s,
              phase: "voting",
              readyPlayers: updatedReady,
              votes,
              timerEnd: Date.now() + 15000
            };
          }
          return { ...s, readyPlayers: updatedReady };
        });
      };

      const submitVote = async () => {
        if (!myVote) return;
        await update(s => ({ ...s, votes:{ ...s.votes, [myName]:myVote } }));
        setVoted(true);
      };

      const advanceTo = async (phase) => {
        await update({ phase });
      };

      const advanceReveal = async () => {
        await update(s => ({ ...s, revealIndex: s.revealIndex + 1 }));
      };

      const playAgain = async () => {
        await update({ phase:"lobby", impIdx:null, crewQ:"", impQ:"", answers:{}, votes:{}, revealIndex:0, readyPlayers:[] });
        setSub(false); setVoted(false); setMyAns(""); setMyVote("");
      };

      // ── Computed ──────────────────────────────────────────────────────────────
      const allAnswered  = gs && gs.players.every(p => gs.answers[p] != null);
      const answeredN    = gs ? gs.players.filter(p => gs.answers[p] != null).length : 0;
      const votedN       = gs ? gs.players.filter(p => gs.votes[p]   != null).length : 0;
      const amImposter   = gs && gs.players[gs.impIdx] === myName;
      const myQ          = gs ? (amImposter ? gs.impQ : gs.crewQ) : "";
      
      const readyCount   = gs?.readyPlayers?.length || 0;
      const neededCount  = gs ? Math.ceil((2 / 3) * gs.players.length) : 0;
      const iAmReady     = gs?.readyPlayers?.includes(myName);

      function voteResults() {
        const t = Object.fromEntries(gs.players.map(p => [p,0]));
        Object.values(gs.votes).filter(Boolean).forEach(v => t[v]++);
        const max = Math.max(...Object.values(t));
        const top = gs.players.filter(p => t[p] === max);
        return { t, max, top };
      }

      // ── LANDING ───────────────────────────────────────────────────────────────
      if (scr === "landing") return (
        <div style={ctr}>
          <div style={{ color:C.cyan, fontSize:"3.5rem", marginBottom:"1rem", filter:`drop-shadow(0 0 10px ${C.cyan})` }}>//🕵️\\</div>
          <h1 style={{ fontSize:"2.25rem", fontWeight:"900", color:C.txt, margin:"0 0 0.2rem 0", letterSpacing:"0.2em" }}>IMPOSTOR</h1>
          <p style={{ color:C.ind, fontSize:"0.75rem", letterSpacing:"0.1em", marginBottom:"3rem", textTransform:"uppercase" }}>[ PROTOCOL MAIN TERMINAL ]</p>
          <div style={{ width:"100%", maxWidth:"320px", display:"flex", flexDirection:"column", gap:"1rem" }}>
            <button onClick={() => setScr("hosting")} style={btn(true, C.ind2)}>INITIALIZE HOST ROOM</button>
            <button onClick={() => setScr("joining")} style={btn(true, "rgba(5, 150, 105, 0.25)")}>UPLINK TO ACCESS POINT</button>
          </div>
        </div>
      );

      // ── HOST SETUP ────────────────────────────────────────────────────────────
      if (scr === "hosting") return (
        <div style={{ ...page }}>
          <button onClick={() => setScr("landing")} style={{ background:"none", border:"none", color:C.ind, cursor:"pointer", padding:0, marginBottom:"1.5rem", fontSize:"0.8rem", fontFamily:"inherit" }}>&lt;&lt; TERMINATE PROCESS</button>
          <h1 style={{ fontSize:"1.5rem", fontWeight:"800", color:C.txt, margin:"0 0 1.5rem 0", letterSpacing:"0.1em" }}>SETUP COMMAND ROOM</h1>

          <div style={{ marginBottom:"1.5rem" }}>
            <label style={lbl}>HOST IDENT CODE</label>
            <input style={inp} placeholder="INPUT CALLSIGN..." value={hostName} onChange={e => setHostName(e.target.value)} onKeyDown={e => e.key==="Enter" && createRoom()} autoFocus />
          </div>

          <div style={{ marginBottom:"2rem" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"0.75rem" }}>
              <label style={{ ...lbl, margin:0 }}>DATA GROUPS Pool ({groups.length})</label>
              <button onClick={() => setShowGF(!showGF)} style={{ background:"none", border:"none", color:C.cyan, cursor:"pointer", fontSize:"0.75rem", fontFamily:"inherit" }}>{showGF ? "[ CLOSE ]" : "[ + APPEND MATRIX ]"}</button>
            </div>
            {showGF && (
              <div style={{ ...card(C.cyan), marginBottom:"1rem" }}>
                <label style={{ fontSize:"0.7rem", color:C.grn, display:"block", marginBottom:"0.5rem" }}>Inject Group Questions (One statement per line)</label>
                <textarea style={{ ...inp, resize:"none", fontSize:"0.85rem", marginBottom:"0.75rem" }} rows={4} placeholder="Query Alpha...&#10;Query Beta..." value={customQuestions} onChange={e => setCustomQuestions(e.target.value)} />
                <button onClick={() => {
                  const splitLines = customQuestions.split("\n").map(l => l.trim()).filter(Boolean);
                  if (splitLines.length < 2) { alert("Matrix requires minimum 2 entry sets!"); return; }
                  setGroups(g => [...g, { id:uid++, questions:splitLines }]);
                  setCustomQuestions(""); setShowGF(false);
                }} style={{ ...btn(customQuestions.trim(), C.grn), padding:"0.6rem", fontSize:"0.8rem" }}>Compile Dataset</button>
              </div>
            )}
            <div style={{ maxHeight:"12rem", overflowY:"auto", display:"flex", flexDirection:"column", gap:"0.5rem" }}>
              {groups.map((g, i) => (
                <div key={g.id} style={card(C.bdr)}>
                  <div style={{ display:"flex", gap:"0.5rem" }}>
                    <div style={{ flex:1 }}>
                      <p style={{ fontSize:"0.7rem", color:C.cyan, margin:"0 0 4px 0", fontWeight:"700" }}>STATION POOL #{i+1} [{g.questions.length} DATASETS]</p>
                      {g.questions.map((q, qidx) => (
                        <p key={qidx} style={{ fontSize:"0.65rem", color:C.txt3, margin:"0 0 2px 0", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>&gt; {q}</p>
                      ))}
                    </div>
                    <button onClick={() => setGroups(gs => gs.filter(x => x.id!==g.id))} style={{ background:"none", border:"none", color:C.red, cursor:"pointer", fontSize:"1.1rem" }}>×</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <button onClick={createRoom} disabled={!hostName.trim()||groups.length===0} style={btn(!!hostName.trim()&&groups.length>0, C.ind2)}>DEPLOY INSTANCE 🪐</button>
        </div>
      );

      // ── JOIN ──────────────────────────────────────────────────────────────────
      if (scr === "joining") return (
        <div style={ctr}>
          <button onClick={() => { setScr("landing"); setErr(""); }} style={{ position:"absolute", top:"2rem", left:"1.5rem", background:"none", border:"none", color:C.ind, cursor:"pointer", fontFamily:"inherit" }}>&lt;&lt; BACK</button>
          <div style={{ color:C.cyan, fontSize:"3rem", marginBottom:"1rem" }}>📡</div>
          <h1 style={{ fontSize:"1.5rem", fontWeight:"800", color:C.txt, margin:"0 0 2rem 0", letterSpacing:"0.1em" }}>TUNING BEACON CHANNEL</h1>
          <div style={{ width:"100%", maxWidth:"320px" }}>
            <div style={{ marginBottom:"1rem" }}>
              <label style={lbl}>USER SIGNATURE</label>
              <input style={inp} placeholder="CALLSIGN..." value={joinName} onChange={e => setJoinName(e.target.value)} autoFocus />
            </div>
            <div style={{ marginBottom:"1.5rem" }}>
              <label style={lbl}>NETWORK ACCESS PIN</label>
              <input style={{ ...inp, textTransform:"uppercase", fontSize:"1.75rem", textAlign:"center", letterSpacing:"0.2em", fontWeight:"800", color:C.ylw }} placeholder="XXXX" maxLength={4} value={joinCode} onChange={e => setJoinCode(e.target.value.toUpperCase())} onKeyDown={e => e.key==="Enter" && joinRoom()} />
            </div>
            {err && <p style={{ color:C.red, fontSize:"0.75rem", marginBottom:"1rem", letterSpacing:"0.05em" }}>⚠️ CRITICAL ERROR: {err}</p>}
            <button onClick={joinRoom} disabled={!joinName.trim()||joinCode.length!==4} style={btn(!!joinName.trim()&&joinCode.length===4, C.grn)}>ESTABLISH UPLINK →</button>
          </div>
        </div>
      );

      // ── GAME ──────────────────────────────────────────────────────────────────
      if (scr === "game" && gs) {
        const { phase, players, host, impIdx, crewQ, impQ, answers, votes, revealIndex = 0 } = gs;
        const impName = players[impIdx];
        const iAmHost = myName === host;

        // LOBBY
        if (phase === "lobby") {
          const addCustomGroup = () => {
            const splitLines = customQuestions.split("\n").map(l => l.trim()).filter(Boolean);
            if (splitLines.length < 2) return;
            update(s => ({ ...s, qGroups:[...s.qGroups, { id:uid++, questions:splitLines }] }));
            setCustomQuestions(""); setShowGF(false);
          };
          return (
            <div style={{ ...page }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"2.5rem", borderBottom:`2px dashed ${C.bdr2}`, paddingBottom:"1.5rem" }}>
                <div>
                  <p style={{ color:C.ind, fontSize:"0.7rem", margin:"0 0 0.2rem 0", letterSpacing:"0.1em" }}>NETWORK FREQUENCY</p>
                  <h2 style={{ color:C.cyan, fontSize:"2.5rem", fontWeight:"900", letterSpacing:"0.15em", margin:0, filter:`drop-shadow(0 0 8px ${C.cyan}44)` }}>{roomCode}</h2>
                </div>
                <span style={{ fontSize:"0.65rem", color:iAmHost?C.ylw:C.cyan, background:"#05051c", border:`1px solid ${iAmHost?C.ylw:C.cyan}`, borderRadius:"2px", padding:"0.3rem 0.6rem", letterSpacing:"0.1em" }}>
                  {iAmHost ? "[👑 MAINFRAME]" : "[👤 CLIENT]"}
                </span>
              </div>

              <div style={{ marginBottom:"2rem" }}>
                <label style={lbl}>MANIFEST SYNCED OPERATIVES ({players.length})</label>
                <div style={{ display:"flex", flexWrap:"wrap", gap:"0.5rem", background:"rgba(0,0,0,0.4)", padding:"0.75rem", borderRadius:"0.25rem", border:`1px dashed ${C.bdr}` }}>
                  {players.map(p => (
                    <span key={p} style={{ background:"#02020a", border:`1px solid ${p===myName?C.cyan:C.bdr2}`, borderRadius:"2px", padding:"0.4rem 0.75rem", fontSize:"0.8rem", color:p===myName?C.cyan:C.txt2 }}>
                      {p===host?"👑 ":""}{p.toUpperCase()}{p===myName?" (YOU)":""}
                    </span>
                  ))}
                </div>
                {players.length < 3 && <p style={{ color:C.ylw, fontSize:"0.7rem", marginTop:"0.5rem", letterSpacing:"0.05em" }}>⚠️ NODE INSIGNIFICANT: Minimum 3 operators required.</p>}
              </div>

              {iAmHost && (
                <div style={{ marginBottom:"2rem" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"0.75rem" }}>
                    <label style={{ ...lbl, margin:0 }}>SECTOR MATRIX POOLS ({gs.qGroups.length})</label>
                    <button onClick={() => setShowGF(!showGF)} style={{ background:"none", border:"none", color:C.cyan, cursor:"pointer", fontSize:"0.75rem", fontFamily:"inherit" }}>{showGF?"[HIDE]":"[+ DATA]"}</button>
                  </div>
                  {showGF && (
                    <div style={{ ...card(C.cyan), marginBottom:"0.75rem" }}>
                      <textarea style={{ ...inp, resize:"none", fontSize:"0.85rem", marginBottom:"0.5rem" }} rows={3} value={customQuestions} onChange={e => setCustomQuestions(e.target.value)} placeholder="Entry 1...&#10;Entry 2..." />
                      <button onClick={addCustomGroup} style={{ ...btn(customQuestions.trim(), C.cyan), padding:"0.5rem", fontSize:"0.75rem" }}>Commit Matrix</button>
                    </div>
                  )}
                  <div style={{ maxHeight:"8rem", overflowY:"auto", display:"flex", flexDirection:"column", gap:"0.4rem" }}>
                    {gs.qGroups.map((g, idx) => (
                      <div key={g.id} style={card(C.bdr, "rgba(0,0,0,0.3)")} padding="0.5rem">
                        <div style={{ display:"flex", justifyContent:"space-between" }}>
                          <span style={{ fontSize:"0.65rem", color:C.ind }}>MATRIX POOL #{idx+1}</span>
                          <button onClick={() => update(s => ({ ...s, qGroups:s.qGroups.filter(x => x.id!==g.id) }))} style={{ background:"none", border:"none", color:C.red, cursor:"pointer" }}>×</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {iAmHost
                ? <button onClick={startGame} disabled={players.length<3||gs.qGroups.length===0} style={btn(players.length>=3&&gs.qGroups.length>0, C.cyan)}>ENGAGE SIMULATION 🚀</button>
                : <WaitCard host={host} />
              }
            </div>
          );
        }

        // ANSWERING
        if (phase === "answering") {
          if (submitted) return (
            <div style={ctr}>
              <div style={{ color:C.grn, fontSize:"3.5rem", marginBottom:"1rem", filter:`drop-shadow(0 0 10px ${C.grn})` }}>✓ DATA BUFFERED</div>
              <p style={{ color:C.txt3, fontSize:"0.85rem", marginBottom:"2rem", letterSpacing:"0.05em" }}>SYNCHRONIZING SECURE ENTRIES: ({answeredN} / {players.length})</p>
              <div style={{ display:"flex", flexWrap:"wrap", gap:"0.5rem", justifyContent:"center", maxWidth:"360px" }}>
                {players.map(p => <Chip key={p} name={p} done={answers[p]!=null} isMe={p===myName} />)}
              </div>
              {iAmHost && allAnswered && (
                <button onClick={() => advanceTo("reveal")} style={{ ...btn(true, C.cyan), marginTop:"2.5rem" }}>
                  DECRYPT & SHOW ENTRY LOGS 📋
                </button>
              )}
              {!iAmHost && allAnswered && <p style={{ color:C.ind, fontSize:"0.75rem", marginTop:"2rem" }} className="status-blink">SYSTEM READY. AWAITING DECRYPTION STROKE FROM MAINFRAME...</p>}
            </div>
          );
          return (
            <div style={{ ...page }}>
              <p style={{ color:C.cyan, fontSize:"0.7rem", margin:"0 0 0.2rem 0", letterSpacing:"0.1em" }}>SECURE DATA FEED FOR:</p>
              <h2 style={{ color:C.txt, fontSize:"1.5rem", fontWeight:"800", margin:"0 0 2rem 0", textTransform:"uppercase" }}>&gt; OPERATIVE {myName}</h2>
              <div style={{ background:"rgba(6, 182, 212, 0.05)", border:`1px dashed ${C.cyan}`, borderRadius:"0.25rem", padding:"1.5rem", marginBottom:"2rem", boxShadow:`inset 0 0 15px rgba(6,182,212,0.1)` }}>
                <p style={{ fontSize:"1rem", lineHeight:"1.6", color:C.txt2, margin:0 }}>{myQ}</p>
              </div>
              <label style={lbl}>COMPILE RESPONSE STREAM</label>
              <textarea style={{ ...inp, resize:"none", marginBottom:"1.5rem" }} rows={4} placeholder="Type transmitting message here..." value={myAns} onChange={e => setMyAns(e.target.value)} autoFocus />
              <button onClick={submitAnswer} disabled={!myAns.trim()} style={btn(!!myAns.trim(), C.cyan)}>TRANSMIT LOG ENTRY ✓</button>
            </div>
          );
        }

        // REVEAL PHASE WITH 2/3 PROGRESSIVE VOTING OVERRIDE
        if (phase === "reveal") {
          const hasMoreToReveal = revealIndex < players.length;

          return (
            <div style={{ ...page }}>
              <div style={{ textAlign:"center", marginBottom:"2rem" }}>
                <div style={{ color:C.cyan, fontSize:"2rem", marginBottom:"0.25rem" }}>[ LOG DECRYPTION HUD ]</div>
                <p style={{ color:C.txt4, fontSize:"0.75rem", margin:0, letterSpacing:"0.05em" }}>
                  {hasMoreToReveal ? `PARTIAL STREAM INDEX: ${revealIndex} / ${players.length}` : "ALL TRANSMISSIONS REVEALED. ANALYZE GRID."}
                </p>
              </div>

              <div style={{ background:"rgba(16, 185, 129, 0.05)", border:`1px solid ${C.grn}`, borderRadius:"0.25rem", padding:"1rem", marginBottom:"1.5rem", boxShadow:`0 0 8px ${C.grn}22` }}>
                <p style={{ fontSize:"0.65rem", color:C.grn, margin:"0 0 4px 0", letterSpacing:"0.1em" }}>// REFERENCE CREW INTERCEPT MATRIX //</p>
                <p style={{ color:C.txt, fontSize:"0.9rem", margin:0 }}>{crewQ}</p>
              </div>

              <div style={{ display:"flex", flexDirection:"column", gap:"1rem", marginBottom:"2rem" }}>
                {players.slice(0, revealIndex).map((p, idx) => (
                  <div 
                    key={p} 
                    className="dramatic-card"
                    style={card(C.cyan, "rgba(5, 5, 20, 0.85)")}
                  >
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"8px", borderBottom:`1px solid ${C.bdr2}`, paddingBottom:"4px" }}>
                      <p style={{ fontSize:"0.8rem", fontWeight:"700", color:C.cyan, margin:0 }}>STATION ID: {p.toUpperCase()}{p===myName?" (YOU)":""}</p>
                      <span style={{ fontSize:"0.6rem", color:C.ind, background:"#000", padding:"2px 6px" }}>
                        BATCH #{idx + 1}
                      </span>
                    </div>
                    <p style={{ color:C.txt2, margin:0, fontSize:"0.95rem", lineHeight:"1.5", fontStyle:"italic" }}>"{answers[p] ?? "NO CAPTURED STREAM"}"</p>
                  </div>
                ))}

                {revealIndex === 0 && (
                  <div style={{ ...card(), textAlign:"center", padding:"2rem", borderStyle:"dashed", borderColor:C.bdr2 }}>
                    <p style={{ color:C.ind, margin:0, fontSize:"0.8rem" }} className="status-blink">&gt;&gt; LOG QUEUE EMPTY. MAINFRAME ACCESS COMMAND REQ &lt;&lt;</p>
                  </div>
                )}
              </div>

              {iAmHost && hasMoreToReveal && (
                <button onClick={advanceReveal} style={{ ...btn(true, C.ind2), marginBottom: "1.5rem" }}>
                  DECRYPT LOG FRAME ({revealIndex + 1} / {players.length}) ✨
                </button>
              )}

              <div style={{ ...card(iAmReady ? C.grn : C.bdr2), textAlign:"center", background:"rgba(0,0,0,0.5)" }}>
                <p style={{ fontSize:"0.75rem", color:C.txt2, marginTop:0, marginBottom:"0.75rem", letterSpacing:"0.05em" }}>
                  FORCE IMMEDIATE DEBATE CLOSURE? ({readyCount} / {neededCount} DECLARED READY)
                </p>
                <button 
                  onClick={handleReadyToVote} 
                  disabled={iAmReady}
                  style={btn(!iAmReady, iAmReady ? "#02020a" : "rgba(16, 185, 129, 0.25)")}
                >
                  {iAmReady ? "[ LOCK ACKNOWLEDGED // SYNCING SYSTEM ]" : "LOCK MY VOTING TERMINAL 🔒"}
                </button>
              </div>
            </div>
          );
        }

        // VOTING PHASE WITH 15S AUTOMATED COUNTDOWN
        if (phase === "voting") {
          return (
            <div style={{ ...page }}>
              {/* Dynamic 15s Countdown Header */}
              <div style={{ textAlign:"center", marginBottom:"2rem", background:"rgba(239, 68, 68, 0.05)", border:`1px solid ${C.red}`, padding:"1rem", borderRadius:"0.25rem", boxShadow:`0 0 15px rgba(239, 68, 68, 0.2)` }}>
                <p style={{ color:C.red, fontSize:"0.7rem", letterSpacing:"0.15em", margin:"0 0 4px 0", fontWeight:"700" }}>⚠️ CRITICAL TIME VECTOR: FORCE SHOW RESULTS IN:</p>
                <h2 style={{ color:C.txt, fontSize:"2.5rem", fontWeight:"900", margin:0, fontFamily:"monospace" }}>{timeLeft}s</h2>
              </div>

              {voted ? (
                <div style={{ textAlign:"center", padding:"2rem 0" }}>
                  <div style={{ color:C.cyan, fontSize:"3.5rem", marginBottom:"1rem" }}>🔒 METRIC LOCKED</div>
                  <h2 style={{ color:C.txt, fontSize:"1.25rem", fontWeight:"700", margin:"0 0 0.5rem 0", letterSpacing:"0.05em" }}>VOTE DISPATCH SUCCESSFUL</h2>
                  <p style={{ color:C.ind, fontSize:"0.75rem", marginBottom:"2rem" }}>GRID RESPONSE METRICS: ({votedN} / {players.length})</p>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:"0.5rem", justifyContent:"center", maxWidth:"320px" }}>
                    {players.map(p => <Chip key={p} name={p} done={votes[p]!=null} isMe={p===myName} />)}
                  </div>
                </div>
              ) : (
                <div>
                  <h2 style={{ color:C.cyan, fontSize:"1.25rem", fontWeight:"800", margin:"0 0 0.25rem 0", letterSpacing:"0.1em" }}>PURGE ANOMALOUS OPERATIVE</h2>
                  <p style={{ color:C.txt3, fontSize:"0.8rem", marginBottom:"2rem" }}>Select signature carrying conflicting packet inputs:</p>
                  <div style={{ display:"flex", flexDirection:"column", gap:"0.75rem", marginBottom:"2rem" }}>
                    {players.filter(p => p!==myName).map(p => (
                      <button key={p} onClick={() => setMyVote(p)} style={{ textAlign:"left", padding:"1rem", borderRadius:"0.25rem", border:`1px solid ${myVote===p?C.cyan:C.bdr2}`, background:myVote===p?"rgba(6, 182, 212, 0.15)":"#02020a", color:myVote===p?C.cyan:C.txt, fontSize:"0.95rem", fontFamily:"inherit", cursor:"pointer", transition:"all 0.15s" }}>
                        {myVote===p?"[X] ":"[ ] "}{p.toUpperCase()}
                      </button>
                    ))}
                  </div>
                  <button onClick={submitVote} disabled={!myVote} style={btn(!!myVote, C.cyan)}>TRANSMIT SELECTION DISCHARGE 🔒</button>
                </div>
              )}
            </div>
          );
        }

        // RESULTS
        if (phase === "results") {
          const { t: tally, top } = voteResults();
          const caught = top.includes(impName) && top.length===1;
          const isTie  = top.length > 1;
          const title  = caught?"ANOMALY COMPROMISED":isTie?"INDETERMINATE GRID TIE":"ANOMALY PURGE FAILURE";
          const col    = caught?C.grn:isTie?C.ylw:C.red;
          const shadow = caught?C.grn:isTie?C.ylw:C.red;
          return (
            <div style={{ ...page }}>
              <div style={{ textAlign:"center", marginBottom:"2.5rem", borderBottom:`2px dashed ${col}`, paddingBottom:"1.5rem" }}>
                <h1 style={{ fontSize:"1.5rem", fontWeight:"900", color:col, margin:"0 0 0.5rem 0", letterSpacing:"0.15em", filter:`drop-shadow(0 0 10px ${shadow})` }}>// {title} //</h1>
                <p style={{ color:C.txt2, fontSize:"0.8rem", marginTop:"0.5rem" }}>
                  {caught?`Operative [${impName.toUpperCase()}] validated as the rogue element.`:isTie?"Tie metrics allowed rogue element to mask trace channels!":`Rogue operative [${impName.toUpperCase()}] cleared detection filters!`}
                </p>
              </div>

              <h3 style={{ fontSize:"0.7rem", color:C.cyan, textTransform:"uppercase", letterSpacing:"0.15em", marginBottom:"0.75rem" }}>GRID PURGE MATRIX TALLY</h3>
              <div style={{ display:"flex", flexDirection:"column", gap:"0.5rem", marginBottom:"2rem" }}>
                {Object.entries(tally).sort((a,b)=>b[1]-a[1]).map(([name, count]) => {
                  const isImp = name===impName;
                  return (
                    <div key={name} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0.8rem 1rem", borderRadius:"0.25rem", background:isImp?"rgba(239, 68, 68, 0.05)":"#02020a", border:isImp?`1px solid ${C.red}`:`1px solid ${C.bdr2}` }}>
                      <span style={{ fontWeight:"500", fontSize:"0.85rem" }}>
                        {name.toUpperCase()}{name===myName?" (YOU)":""} {isImp && <span style={{ color:C.red, fontSize:"0.65rem", marginLeft:"8px", border:`1px solid ${C.red}`, padding:"0 4px" }}>ROGUE UNIT</span>}
                      </span>
                      <span style={{ fontWeight:"700", color:top.includes(name)&&count>0?C.ylw:C.txt4, fontSize:"0.85rem" }}>
                        {count} CORRUPT_SIGS
                      </span>
                    </div>
                  );
                })}
              </div>

              <h3 style={{ fontSize:"0.7rem", color:C.cyan, textTransform:"uppercase", letterSpacing:"0.15em", marginBottom:"0.75rem" }}>INTERCEPTED PACKET CONTENTS</h3>
              <div style={{ display:"flex", flexDirection:"column", gap:"0.75rem", marginBottom:"2.5rem" }}>
                <div style={{ background:"rgba(16, 185, 129, 0.05)", border:`1px solid ${C.grn}`, borderRadius:"0.25rem", padding:"1rem" }}>
                  <p style={{ fontSize:"0.65rem", color:C.grn, margin:"0 0 4px 0", letterSpacing:"0.05em" }}>[👥 CREW GENERATED ROUTINE]</p>
                  <p style={{ color:C.txt, fontSize:"0.9rem", margin:0 }}>{crewQ}</p>
                </div>
                <div style={{ background:"rgba(239, 68, 68, 0.05)", border:`1px solid ${C.red}`, borderRadius:"0.25rem", padding:"1rem" }}>
                  <p style={{ fontSize:"0.65rem", color:C.red, margin:"0 0 4px 0", letterSpacing:"0.05em" }}>[🕵️ ANOMALOUS OVERRIDE STRAT // UNIT: {impName.toUpperCase()}]</p>
                  <p style={{ color:C.txt, fontSize:"0.9rem", margin:0 }}>{impQ}</p>
                </div>
              </div>

              {iAmHost
                ? <button onClick={playAgain} style={btn(true, C.ind2)}>RE-ENGAGE LOGIC MODULES 🔄</button>
                : <WaitCard host={host} />
              }
            </div>
          );
        }
      }

      return <div style={ctr} className="status-blink"><p style={{ color:C.cyan, letterSpacing:"0.2em" }}>&gt;&gt; LOADING SECURE CORE CORE HUD EXTENSIONS... &lt;&lt;</p></div>;
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
