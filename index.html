<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impostor Game</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0a0a14;
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #111827;
    }
    ::-webkit-scrollbar-thumb {
      background: #2d3748;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ── Shared Network Storage for Multiplayer ───────────────────────────────
    window.storage = {
      get: async (key) => {
        try {
          const res = await fetch('/api/get', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key })
          });
          return await res.json(); 
        } catch (e) {
          console.error("Error fetching state:", e);
          return null;
        }
      },
      set: async (key, val) => {
        try {
          const res = await fetch('/api/set', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key, value: val })
          });
          const data = await res.json();
          return data.success;
        } catch (e) {
          console.error("Error updating state:", e);
          return false;
        }
      }
    };

    const DEFAULTS = [
      { id: 1, crew: "What's your favorite season and why?", imp: "What's your least favorite season and why?" },
      { id: 2, crew: "Describe your perfect vacation destination", imp: "Describe somewhere you'd absolutely hate to visit" },
      { id: 3, crew: "What's your go-to comfort food?", imp: "What food can you absolutely not stand?" },
      { id: 4, crew: "What superpower would you choose and why?", imp: "What superpower would be most useless to you?" },
      { id: 5, crew: "Describe your ideal Saturday morning", imp: "Describe your worst possible Saturday morning" },
      { id: 6, crew: "What's the best gift you've ever received?", imp: "What's the worst gift you've ever received?" },
      { id: 7, crew: "What's a skill you're proud of?", imp: "What's a skill you've always wanted but never learned?" },
      { id: 8, crew: "What's your favorite way to spend a rainy day?", imp: "What do you hate doing on a rainy day?" },
    ];

    let uid = DEFAULTS.length + 1;
    const genCode = () => Math.random().toString(36).slice(2, 6).toUpperCase();

    // ── Styles ──────────────────────────────────────────────────────────────────
    const C = {
      bg:"#0a0a14", bg2:"#1a1f2e", bg3:"#111827",
      ind:"#818cf8", ind2:"#4f46e5", ind3:"#1e1b4b",
      grn:"#34d399", red:"#f87171", ylw:"#fbbf24",
      txt:"#fff", txt2:"#d1d5db", txt3:"#9ca3af", txt4:"#6b7280",
      bdr:"#2d3748", bdr2:"#374151",
    };
    const page = { minHeight:"100vh", background:C.bg, color:C.txt, padding:"1.5rem", maxWidth:"480px", margin:"0 auto", fontFamily:"system-ui,sans-serif", boxSizing:"border-box" };
    const ctr  = { ...page, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", maxWidth:"100vw", textAlign:"center" };
    const btn  = (on=true, bg=C.ind2) => ({ width:"100%", background:on?bg:C.bdr2, border:"none", borderRadius:"1rem", padding:"1.1rem", color:C.txt, fontWeight:"700", fontSize:"1.05rem", cursor:on?"pointer":"not-allowed", opacity:on?1:0.5, transition:"opacity 0.15s" });
    const inp  = { width:"100%", background:C.bg2, border:`1px solid ${C.bdr}`, borderRadius:"0.875rem", padding:"0.875rem", color:C.txt, fontSize:"1rem", outline:"none", boxSizing:"border-box" };
    const card = (bdr=C.bdr, bg=C.bg2) => ({ background:bg, border:`1px solid ${bdr}`, borderRadius:"1rem", padding:"1rem" });
    const lbl  = { fontSize:"0.7rem", textTransform:"uppercase", letterSpacing:"0.07em", color:C.txt4, marginBottom:"0.4rem", display:"block" };

    function Chip({ name, done, isMe }) {
      return (
        <span style={{ background:C.bg2, border:`1px solid ${done ? "#059669" : isMe ? C.ind : C.bdr}`, borderRadius:"9999px", padding:"0.35rem 0.8rem", fontSize:"0.8rem", color:done ? C.grn : isMe ? "#c7d2fe" : C.txt4 }}>
          {done ? "✓ " : "⏳ "}{name}{isMe ? " (you)" : ""}
        </span>
      );
    }

    function WaitCard({ host }) {
      return (
        <div style={{ ...card(), textAlign:"center", padding:"1.25rem" }}>
          <p style={{ color:C.txt3, margin:0 }}>⏳ Waiting for <strong style={{ color:C.ind }}>{host}</strong>…</p>
        </div>
      );
    }

    function App() {
      const [scr, setScr]           = useState("landing");
      const [myName, setMyName]     = useState("");
      const [roomCode, setRoomCode] = useState("");
      const [isHost, setIsHost]     = useState(false);
      const [gs, setGs]             = useState(null);

      // per-round local
      const [myAns, setMyAns]   = useState("");
      const [myVote, setMyVote] = useState("");
      const [submitted, setSub] = useState(false);
      const [voted, setVoted]   = useState(false);

      // forms
      const [hostName, setHostName] = useState("");
      const [joinName, setJoinName] = useState("");
      const [joinCode, setJoinCode] = useState("");
      const [pairs, setPairs]       = useState(DEFAULTS);
      const [showPF, setShowPF]     = useState(false);
      const [crewIn, setCrewIn]     = useState("");
      const [impIn, setImpIn]       = useState("");
      const [err, setErr]           = useState("");

      // ── Poll ──────────────────────────────────────────────────────────────────
      useEffect(() => {
        if (!roomCode || scr !== "game") return;
        const poll = async () => {
          try {
            const r = await window.storage.get(`room:${roomCode}`);
            if (r && r.value) setGs(JSON.parse(r.value));
          } catch {}
        };
        poll();
        const t = setInterval(poll, 1500);
        return () => clearInterval(t);
      }, [roomCode, scr]);

      // reset local state on phase change
      useEffect(() => {
        if (!gs || !myName) return;
        if (gs.phase === "answering") {
          if (gs.answers[myName] != null) setSub(true);
          else { setSub(false); setMyAns(""); }
        }
        if (gs.phase === "voting") {
          if (gs.votes[myName] != null) setVoted(true);
          else { setVoted(false); setMyVote(""); }
        }
      }, [gs?.phase, myName]);

      // ── Storage update ────────────────────────────────────────────────────────
      const update = useCallback(async (fn) => {
        try {
          const r = await window.storage.get(`room:${roomCode}`);
          if (!r || !r.value) return;
          const cur  = JSON.parse(r.value);
          const next = typeof fn === "function" ? fn(cur) : { ...cur, ...fn };
          await window.storage.set(`room:${roomCode}`, JSON.stringify(next));
          setGs(next);
        } catch (e) { console.error(e); }
      }, [roomCode]);

      // ── Handlers ──────────────────────────────────────────────────────────────
      const createRoom = async () => {
        if (!hostName.trim() || pairs.length === 0) return;
        const code = genCode();
        const state = { phase:"lobby", players:[hostName.trim()], host:hostName.trim(), impIdx:null, pair:null, answers:{}, votes:{}, qPairs:pairs };
        const ok = await window.storage.set(`room:${code}`, JSON.stringify(state));
        if (ok) {
          setMyName(hostName.trim()); setRoomCode(code); setIsHost(true); setGs(state); setScr("game");
        }
      };

      const joinRoom = async () => {
        const name = joinName.trim(), code = joinCode.trim().toUpperCase();
        if (!name || code.length !== 4) return;
        try {
          const r = await window.storage.get(`room:${code}`);
          if (!r || !r.value) { setErr("Room not found."); return; }
          const state = JSON.parse(r.value);
          if (state.phase !== "lobby" && !state.players.includes(name)) { setErr("Game already started."); return; }
          let next = state;
          if (!state.players.includes(name)) {
            next = { ...state, players:[...state.players, name] };
            await window.storage.set(`room:${code}`, JSON.stringify(next));
          }
          setMyName(name); setRoomCode(code); setIsHost(state.host === name); setGs(next); setScr("game");
        } catch { setErr("Could not connect to room."); }
      };

      const startGame = async () => {
        const players = gs.players;
        const impIdx  = Math.floor(Math.random() * players.length);
        const pair    = gs.qPairs[Math.floor(Math.random() * gs.qPairs.length)];
        const answers = Object.fromEntries(players.map(p => [p, null]));
        await update({ phase:"answering", impIdx, pair, answers, votes:{} });
        setSub(false); setMyAns("");
      };

      const submitAnswer = async () => {
        if (!myAns.trim()) return;
        await update(s => ({ ...s, answers:{ ...s.answers, [myName]:myAns.trim() } }));
        setSub(true);
      };

      const submitVote = async () => {
        if (!myVote) return;
        await update(s => ({ ...s, votes:{ ...s.votes, [myName]:myVote } }));
        setVoted(true);
      };

      const advanceTo = async (phase) => {
        if (phase === "voting") {
          const votes = Object.fromEntries(gs.players.map(p => [p, null]));
          await update({ phase:"voting", votes }); setVoted(false); setMyVote("");
        } else {
          await update({ phase });
        }
      };

      const playAgain = async () => {
        await update({ phase:"lobby", impIdx:null, pair:null, answers:{}, votes:{} });
        setSub(false); setVoted(false); setMyAns(""); setMyVote("");
      };

      // ── Computed ──────────────────────────────────────────────────────────────
      const allAnswered  = gs && gs.players.every(p => gs.answers[p] != null);
      const allVoted     = gs && gs.players.every(p => gs.votes[p] != null);
      const answeredN    = gs ? gs.players.filter(p => gs.answers[p] != null).length : 0;
      const votedN       = gs ? gs.players.filter(p => gs.votes[p]   != null).length : 0;
      const amImposter   = gs && gs.players[gs.impIdx] === myName;
      const myQ          = gs?.pair ? (amImposter ? gs.pair.imp : gs.pair.crew) : "";

      function voteResults() {
        const t = Object.fromEntries(gs.players.map(p => [p,0]));
        Object.values(gs.votes).filter(Boolean).forEach(v => t[v]++);
        const max = Math.max(...Object.values(t));
        const top = gs.players.filter(p => t[p] === max);
        return { t, max, top };
      }

      // ── LANDING ───────────────────────────────────────────────────────────────
      if (scr === "landing") return (
        <div style={ctr}>
          <div style={{ fontSize:"4rem", marginBottom:"0.75rem" }}>🕵️</div>
          <h1 style={{ fontSize:"2.5rem", fontWeight:"900", color:C.ind, margin:"0 0 0.4rem 0" }}>Impostor</h1>
          <p style={{ color:C.txt4, fontSize:"0.9rem", marginBottom:"3rem", maxWidth:"260px", lineHeight:"1.5" }}>
            One player secretly gets a different question. Can the crew figure out who?
          </p>
          <div style={{ width:"100%", maxWidth:"300px", display:"flex", flexDirection:"column", gap:"0.75rem" }}>
            <button onClick={() => setScr("hosting")} style={btn()}>🏠 Host a Game</button>
            <button onClick={() => setScr("joining")} style={btn(true,"#059669")}>🔗 Join a Game</button>
          </div>
        </div>
      );

      // ── HOST SETUP ────────────────────────────────────────────────────────────
      if (scr === "hosting") return (
        <div style={{ ...page, paddingTop:"2rem" }}>
          <button onClick={() => setScr("landing")} style={{ background:"none", border:"none", color:C.txt4, cursor:"pointer", padding:0, marginBottom:"1.25rem", fontSize:"0.9rem" }}>← Back</button>
          <h1 style={{ fontSize:"1.75rem", fontWeight:"800", color:C.ind, margin:"0 0 1.75rem 0" }}>Host a Game</h1>

          <div style={{ marginBottom:"1.5rem" }}>
            <label style={lbl}>Your name</label>
            <input style={inp} placeholder="Enter your name…" value={hostName} onChange={e => setHostName(e.target.value)} onKeyDown={e => e.key==="Enter" && createRoom()} autoFocus />
          </div>

          <div style={{ marginBottom:"2rem" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"0.75rem" }}>
              <label style={{ ...lbl, margin:0 }}>Question pairs ({pairs.length})</label>
              <button onClick={() => setShowPF(!showPF)} style={{ background:"none", border:"none", color:C.ind, cursor:"pointer", fontSize:"0.8rem" }}>{showPF ? "Cancel" : "+ Add custom"}</button>
            </div>
            {showPF && (
              <div style={{ ...card(), marginBottom:"0.75rem" }}>
                <label style={{ fontSize:"0.72rem", color:C.grn, display:"block", marginBottom:"0.25rem" }}>👥 Crewmate question</label>
                <textarea style={{ ...inp, resize:"none", fontSize:"0.875rem", marginBottom:"0.75rem" }} rows={2} placeholder="All crewmates see this…" value={crewIn} onChange={e => setCrewIn(e.target.value)} />
                <label style={{ fontSize:"0.72rem", color:C.red, display:"block", marginBottom:"0.25rem" }}>🕵️ Impostor question</label>
                <textarea style={{ ...inp, resize:"none", fontSize:"0.875rem", marginBottom:"0.75rem" }} rows={2} placeholder="Only the impostor sees this…" value={impIn} onChange={e => setImpIn(e.target.value)} />
                <button onClick={() => {
                  if (!crewIn.trim() || !impIn.trim()) return;
                  setPairs(p => [...p, { id:uid++, crew:crewIn.trim(), imp:impIn.trim() }]);
                  setCrewIn(""); setImpIn(""); setShowPF(false);
                }} style={{ ...btn(crewIn.trim()&&impIn.trim()), padding:"0.7rem", fontSize:"0.9rem" }}>Save Pair</button>
              </div>
            )}
            <div style={{ maxHeight:"14rem", overflowY:"auto", display:"flex", flexDirection:"column", gap:"0.5rem" }}>
              {pairs.map(p => (
                <div key={p.id} style={card()}>
                  <div style={{ display:"flex", gap:"0.5rem" }}>
                    <div style={{ flex:1 }}>
                      <p style={{ fontSize:"0.7rem", color:C.grn, margin:"0 0 2px 0" }}>👥 {p.crew}</p>
                      <p style={{ fontSize:"0.7rem", color:C.red, margin:0 }}>🕵️ {p.imp}</p>
                    </div>
                    <button onClick={() => setPairs(ps => ps.filter(x => x.id!==p.id))} style={{ background:"none", border:"none", color:C.txt4, cursor:"pointer", fontSize:"1.2rem", lineHeight:1 }}>×</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <button onClick={createRoom} disabled={!hostName.trim()||pairs.length===0} style={btn(!!hostName.trim()&&pairs.length>0)}>Create Room 🏠</button>
        </div>
      );

      // ── JOIN ──────────────────────────────────────────────────────────────────
      if (scr === "joining") return (
        <div style={ctr}>
          <button onClick={() => { setScr("landing"); setErr(""); }} style={{ position:"absolute", top:"1.5rem", left:"1.5rem", background:"none", border:"none", color:C.txt4, cursor:"pointer" }}>← Back</button>
          <div style={{ fontSize:"3rem", marginBottom:"0.75rem" }}>🔗</div>
          <h1 style={{ fontSize:"1.75rem", fontWeight:"800", color:C.ind, margin:"0 0 2rem 0" }}>Join a Game</h1>
          <div style={{ width:"100%", maxWidth:"300px" }}>
            <div style={{ marginBottom:"1rem" }}>
              <label style={lbl}>Your name</label>
              <input style={inp} placeholder="Enter your name…" value={joinName} onChange={e => setJoinName(e.target.value)} autoFocus />
            </div>
            <div style={{ marginBottom:"1.5rem" }}>
              <label style={lbl}>Room code</label>
              <input style={{ ...inp, textTransform:"uppercase", fontSize:"2rem", textAlign:"center", letterSpacing:"0.3em", fontWeight:"800" }} placeholder="XXXX" maxLength={4} value={joinCode} onChange={e => setJoinCode(e.target.value.toUpperCase())} onKeyDown={e => e.key==="Enter" && joinRoom()} />
            </div>
            {err && <p style={{ color:C.red, fontSize:"0.875rem", marginBottom:"1rem" }}>⚠ {err}</p>}
            <button onClick={joinRoom} disabled={!joinName.trim()||joinCode.length!==4} style={btn(!!joinName.trim()&&joinCode.length===4,"#059669")}>Join Game →</button>
          </div>
        </div>
      );

      // ── GAME ──────────────────────────────────────────────────────────────────
      if (scr === "game" && gs) {
        const { phase, players, host, impIdx, pair, answers, votes } = gs;
        const impName = players[impIdx];
        const iAmHost = myName === host;

        // LOBBY
        if (phase === "lobby") {
          const addQP = () => {
            if (!crewIn.trim()||!impIn.trim()) return;
            update(s => ({ ...s, qPairs:[...s.qPairs, { id:uid++, crew:crewIn.trim(), imp:impIn.trim() }] }));
            setCrewIn(""); setImpIn(""); setShowPF(false);
          };
          return (
            <div style={{ ...page, paddingTop:"2rem" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"2rem" }}>
                <div>
                  <p style={{ color:C.txt4, fontSize:"0.8rem", margin:"0 0 0.2rem 0" }}>Room code</p>
                  <h2 style={{ color:C.ind, fontSize:"2.75rem", fontWeight:"900", letterSpacing:"0.25em", margin:0 }}>{roomCode}</h2>
                  <p style={{ color:"#374151", fontSize:"0.72rem", marginTop:"0.2rem" }}>Share this with your friends</p>
                </div>
                <span style={{ fontSize:"0.72rem", color:iAmHost?C.ylw:C.txt4, background:C.bg2, borderRadius:"9999px", padding:"0.3rem 0.75rem", border:`1px solid ${iAmHost?"#92400e":C.bdr}` }}>
                  {iAmHost ? "👑 Host" : "👤 Player"}
                </span>
              </div>

              <div style={{ marginBottom:"1.5rem" }}>
                <label style={lbl}>Players ({players.length})</label>
                <div style={{ display:"flex", flexWrap:"wrap", gap:"0.5rem" }}>
                  {players.map(p => (
                    <span key={p} style={{ background:C.bg2, border:`1px solid ${p===myName?C.ind:C.bdr}`, borderRadius:"9999px", padding:"0.35rem 0.85rem", fontSize:"0.85rem", color:p===myName?"#c7d2fe":C.txt2 }}>
                      {p===host?"👑 ":""}{p}{p===myName?" (you)":""}
                    </span>
                  ))}
                </div>
                {players.length < 3 && <p style={{ color:C.ylw, fontSize:"0.75rem", marginTop:"0.5rem" }}>⚠ Need at least 3 players to start</p>}
              </div>

              {iAmHost && (
                <div style={{ marginBottom:"2rem" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"0.75rem" }}>
                    <label style={{ ...lbl, margin:0 }}>Questions ({gs.qPairs.length} pairs)</label>
                    <button onClick={() => setShowPF(!showPF)} style={{ background:"none", border:"none", color:C.ind, cursor:"pointer", fontSize:"0.8rem" }}>{showPF?"Cancel":"+ Add custom"}</button>
                  </div>
                  {showPF && (
                    <div style={{ ...card(), marginBottom:"0.75rem" }}>
                      <label style={{ fontSize:"0.72rem", color:C.grn, display:"block", marginBottom:"0.25rem" }}>👥 Crewmate question</label>
                      <textarea style={{ ...inp, resize:"none", fontSize:"0.875rem", marginBottom:"0.75rem" }} rows={2} value={crewIn} onChange={e => setCrewIn(e.target.value)} placeholder="All crewmates see this…" />
                      <label style={{ fontSize:"0.72rem", color:C.red, display:"block", marginBottom:"0.25rem" }}>🕵️ Impostor question</label>
                      <textarea style={{ ...inp, resize:"none", fontSize:"0.875rem", marginBottom:"0.75rem" }} rows={2} value={impIn} onChange={e => setImpIn(e.target.value)} placeholder="Only the impostor sees this…" />
                      <button onClick={addQP} style={{ ...btn(crewIn.trim()&&impIn.trim()), padding:"0.7rem", fontSize:"0.9rem" }}>Save</button>
                    </div>
                  )}
                  <div style={{ maxHeight:"10rem", overflowY:"auto", display:"flex", flexDirection:"column", gap:"0.5rem" }}>
                    {gs.qPairs.map(p => (
                      <div key={p.id} style={card()}>
                        <div style={{ display:"flex", gap:"0.5rem" }}>
                          <div style={{ flex:1 }}>
                            <p style={{ fontSize:"0.68rem", color:C.grn, margin:"0 0 2px 0" }}>👥 {p.crew}</p>
                            <p style={{ fontSize:"0.68rem", color:C.red, margin:0 }}>🕵️ {p.imp}</p>
                          </div>
                          <button onClick={() => update(s => ({ ...s, qPairs:s.qPairs.filter(x => x.id!==p.id) }))} style={{ background:"none", border:"none", color:C.txt4, cursor:"pointer", fontSize:"1.2rem", lineHeight:1 }}>×</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {iAmHost
                ? <button onClick={startGame} disabled={players.length<3||gs.qPairs.length===0} style={btn(players.length>=3&&gs.qPairs.length>0)}>Start Game 🚀</button>
                : <WaitCard host={host} />
              }
            </div>
          );
        }

        // ANSWERING
        if (phase === "answering") {
          if (submitted) return (
            <div style={ctr}>
              <div style={{ fontSize:"3rem", marginBottom:"0.75rem" }}>✅</div>
              <h2 style={{ color:C.grn, fontSize:"1.5rem", fontWeight:"700", margin:"0 0 0.5rem 0" }}>Answer submitted!</h2>
              <p style={{ color:C.txt3, marginBottom:"2rem" }}>Waiting for others… ({answeredN}/{players.length})</p>
              <div style={{ display:"flex", flexWrap:"wrap", gap:"0.5rem", justifyContent:"center", maxWidth:"320px" }}>
                {players.map(p => <Chip key={p} name={p} done={answers[p]!=null} isMe={p===myName} />)}
              </div>
              {iAmHost && allAnswered && (
                <button onClick={() => advanceTo("reveal")} style={{ ...btn(), width:"auto", padding:"0.9rem 2rem", marginTop:"2rem", fontSize:"1rem" }}>
                  Reveal Answers 📋
                </button>
              )}
              {!iAmHost && allAnswered && <p style={{ color:C.txt4, fontSize:"0.8rem", marginTop:"1.5rem" }}>All answers in! Waiting for {host} to reveal…</p>}
            </div>
          );
          return (
            <div style={{ ...page, paddingTop:"2rem" }}>
              <p style={{ color:C.txt4, fontSize:"0.875rem", margin:"0 0 0.2rem 0" }}>Question for</p>
              <h2 style={{ color:C.ind, fontSize:"1.75rem", fontWeight:"800", margin:"0 0 2rem 0" }}>{myName}</h2>
              <div style={{ background:"#1a1a2e", border:`1px solid ${C.ind3}`, borderRadius:"1.25rem", padding:"1.5rem", marginBottom:"1.5rem" }}>
                <p style={{ fontSize:"1.1rem", lineHeight:"1.65", color:"#e0e7ff", margin:0 }}>{myQ}</p>
              </div>
              <label style={lbl}>Your answer</label>
              <textarea style={{ ...inp, resize:"none", marginBottom:"1rem" }} rows={4} placeholder="Type your answer…" value={myAns} onChange={e => setMyAns(e.target.value)} autoFocus />
              <button onClick={submitAnswer} disabled={!myAns.trim()} style={btn(!!myAns.trim())}>Submit Answer ✓</button>
            </div>
          );
        }

        // REVEAL
        if (phase === "reveal") return (
          <div style={{ ...page, paddingTop:"2rem" }}>
            <div style={{ textAlign:"center", marginBottom:"1.75rem" }}>
              <div style={{ fontSize:"2rem", marginBottom:"0.5rem" }}>📋</div>
              <h1 style={{ fontSize:"1.75rem", fontWeight:"800", margin:0 }}>Answers Revealed</h1>
              <p style={{ color:C.txt4, fontSize:"0.875rem", marginTop:"0.25rem" }}>Discuss — whose answer seems suspicious?</p>
            </div>
            <div style={{ background:"#064e3b22", border:"1px solid #059669", borderRadius:"1rem", padding:"1rem", marginBottom:"1.25rem" }}>
              <p style={{ fontSize:"0.68rem", color:C.grn, margin:"0 0 6px 0", textTransform:"uppercase", letterSpacing:"0.07em" }}>👥 The Crewmate Question</p>
              <p style={{ color:C.txt, fontWeight:"500", margin:0 }}>{pair.crew}</p>
            </div>
            <div style={{ display:"flex", flexDirection:"column", gap:"0.625rem", marginBottom:"1.5rem" }}>
              {players.map(p => (
                <div key={p} style={card()}>
                  <p style={{ fontSize:"0.78rem", fontWeight:"600", color:C.ind, margin:"0 0 5px 0" }}>{p}{p===myName?" (you)":""}</p>
                  <p style={{ color:C.txt2, margin:0, lineHeight:"1.5" }}>{answers[p] ?? "(no answer)"}</p>
                </div>
              ))}
            </div>
            <div style={{ background:"#78350f22", border:"1px solid #d97706", borderRadius:"0.875rem", padding:"0.875rem", marginBottom:"1.5rem" }}>
              <p style={{ color:"#fcd34d", fontSize:"0.875rem", margin:0 }}>💬 The impostor answered a completely different question. Discuss out loud, then vote!</p>
            </div>
            {iAmHost
              ? <button onClick={() => advanceTo("voting")} style={btn()}>Start Voting 🗳️</button>
              : <WaitCard host={host} />
            }
          </div>
        );

        // VOTING
        if (phase === "voting") {
          if (voted) return (
            <div style={ctr}>
              <div style={{ fontSize:"3rem", marginBottom:"0.75rem" }}>🔒</div>
              <h2 style={{ color:C.ind, fontSize:"1.5rem", fontWeight:"700", margin:"0 0 0.5rem 0" }}>Vote locked in!</h2>
              <p style={{ color:C.txt3, marginBottom:"2rem" }}>Waiting for others… ({votedN}/{players.length})</p>
              <div style={{ display:"flex", flexWrap:"wrap", gap:"0.5rem", justifyContent:"center", maxWidth:"320px" }}>
                {players.map(p => <Chip key={p} name={p} done={votes[p]!=null} isMe={p===myName} />)}
              </div>
              {iAmHost && allVoted && (
                <button onClick={() => advanceTo("results")} style={{ ...btn(), width:"auto", padding:"0.9rem 2rem", marginTop:"2rem", fontSize:"1rem" }}>
                  Reveal Results 🎯
                </button>
              )}
              {!iAmHost && allVoted && <p style={{ color:C.txt4, fontSize:"0.8rem", marginTop:"1.5rem" }}>All votes in! Waiting for {host} to reveal…</p>}
            </div>
          );
          return (
            <div style={{ ...page, paddingTop:"2rem" }}>
              <h2 style={{ color:C.ind, fontSize:"1.75rem", fontWeight:"800", margin:"0 0 0.25rem 0" }}>Your Vote</h2>
              <p style={{ color:C.txt4, fontSize:"0.875rem", marginBottom:"1.5rem" }}>Who do you think got a different question?</p>
              <div style={{ display:"flex", flexDirection:"column", gap:"0.625rem", marginBottom:"2rem" }}>
                {players.filter(p => p!==myName).map(p => (
                  <button key={p} onClick={() => setMyVote(p)} style={{ textAlign:"left", padding:"1rem", borderRadius:"1rem", border:`2px solid ${myVote===p?C.ind:C.bdr}`, background:myVote===p?C.ind3:C.bg2, color:C.txt, fontSize:"1rem", fontWeight:"500", cursor:"pointer" }}>
                    {myVote===p?"✓ ":""}{p}
                  </button>
                ))}
              </div>
              <button onClick={submitVote} disabled={!myVote} style={btn(!!myVote)}>Lock In Vote 🔒</button>
            </div>
          );
        }

        // RESULTS
        if (phase === "results") {
          const { t: tally, top } = voteResults();
          const caught = top.includes(impName) && top.length===1;
          const isTie  = top.length > 1;
          const emoji  = caught?"🎉":isTie?"🤝":"😈";
          const title  = caught?"Impostor Caught!":isTie?"It's a Tie — Impostor Escapes!":"Impostor Wins!";
          const col    = caught?C.grn:isTie?C.ylw:C.red;
          return (
            <div style={{ ...page, paddingTop:"2rem" }}>
              <div style={{ textAlign:"center", marginBottom:"2rem" }}>
                <div style={{ fontSize:"4rem", marginBottom:"0.75rem" }}>{emoji}</div>
                <h1 style={{ fontSize:"1.875rem", fontWeight:"800", color:col, margin:"0 0 0.5rem 0" }}>{title}</h1>
                <p style={{ color:C.txt3, fontSize:"0.875rem" }}>
                  {caught?`The crew correctly identified ${impName}!`:isTie?"No consensus — the impostor slipped away!":`${impName} blended in perfectly!`}
                </p>
              </div>

              <h3 style={{ fontSize:"0.68rem", color:C.txt4, textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:"0.75rem" }}>Vote Count</h3>
              <div style={{ display:"flex", flexDirection:"column", gap:"0.5rem", marginBottom:"1.5rem" }}>
                {Object.entries(tally).sort((a,b)=>b[1]-a[1]).map(([name, count]) => {
                  const isImp = name===impName;
                  return (
                    <div key={name} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0.875rem 1rem", borderRadius:"0.875rem", background:isImp?"#1a0505":C.bg2, border:isImp?`1px solid ${C.red}`:`1px solid ${C.bdr}` }}>
                      <span style={{ fontWeight:"500" }}>
                        {name}{name===myName?" (you)":""} {isImp && <span style={{ color:C.red, fontSize:"0.72rem" }}>🕵️ IMPOSTOR</span>}
                      </span>
                      <span style={{ fontWeight:"700", color:top.includes(name)&&count>0?C.ylw:C.txt4 }}>
                        {count} vote{count!==1?"s":""}
                      </span>
                    </div>
                  );
                })}
              </div>

              <h3 style={{ fontSize:"0.68rem", color:C.txt4, textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:"0.75rem" }}>The Questions</h3>
              <div style={{ display:"flex", flexDirection:"column", gap:"0.5rem", marginBottom:"2rem" }}>
                <div style={{ background:"#064e3b22", border:"1px solid #059669", borderRadius:"0.875rem", padding:"1rem" }}>
                  <p style={{ fontSize:"0.68rem", color:C.grn, margin:"0 0 6px 0" }}>👥 Crewmate question</p>
                  <p style={{ color:C.txt, margin:0 }}>{pair.crew}</p>
                </div>
                <div style={{ background:"#450a0a33", border:"1px solid #dc2626", borderRadius:"0.875rem", padding:"1rem" }}>
                  <p style={{ fontSize:"0.68rem", color:C.red, margin:"0 0 6px 0" }}>🕵️ Impostor question ({impName})</p>
                  <p style={{ color:C.txt, margin:0 }}>{pair.imp}</p>
                </div>
              </div>

              {iAmHost
                ? <button onClick={playAgain} style={btn()}>Play Again 🔄</button>
                : <WaitCard host={host} />
              }
            </div>
          );
        }
      }

      return <div style={ctr}><p style={{ color:C.txt3 }}>⏳ Connecting…</p></div>;
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
