<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Impostor Game</title>
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      background-color: #0a0a14;
    }
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #111827;
    }
    ::-webkit-scrollbar-thumb {
      background: #2d3748;
      border-radius: 4px;
    }

    /* Dramatic Entry Animation for Answers */
    @keyframes dramaticReveal {
      0% {
        opacity: 0;
        transform: scale(0.8) translateY(20px);
        filter: blur(10px);
      }
      50% {
        filter: blur(0px);
      }
      100% {
        opacity: 1;
        transform: scale(1) translateY(0);
        box-shadow: 0 0 20px rgba(129, 140, 248, 0.2);
      }
    }

    .dramatic-card {
      animation: dramaticReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
  </style>
</head>
<body>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // ── Shared Network Storage for Multiplayer ───────────────────────────────
    window.storage = {
      get: async (key) => {
        try {
          const res = await fetch('/api/get', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key })
          });
          return await res.json(); 
        } catch (e) {
          console.error("Error fetching state:", e);
          return null;
        }
      },
      set: async (key, val) => {
        try {
          const res = await fetch('/api/set', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ key, value: val })
          });
          const data = await res.json();
          return data.success;
        } catch (e) {
          console.error("Error updating state:", e);
          return false;
        }
      }
    };

    const DEFAULT_GROUPS = [
      {
        id: 1,
        questions: [
          "What time do you think is optimal for going to sleep?",
          "What time do you eat dinner?"
        ]
      },
      {
        id: 2,
        questions: [
          "What is the ideal temperature (Celsius)?",
          "What temperature is too hot?",
          "What is the oldest person you would date?",
          "At what age should it be socially looked down upon to be unemployed?"
        ]
      },
      {
        id: 3,
        questions: [
          "How much time do you spend on your screen per day excluding school?",
          "How much time do you spend exercising per day?"
        ]
      },
      {
        id: 4,
        questions: [
          "What is the ugliest block in Minecraft?",
          "What block do you use the most in Minecraft?"
        ]
      },
      {
        id: 5,
        questions: [
          "At what age did you first get a smartphone?",
          "At what age did you learn how to tie your shoes?"
        ]
      },
      {
        id: 6,
        questions: [
          "What language would you want to know how to speak (you don’t have to learn it)?",
          "What language would you never want to learn?",
          "What is the most beautiful language?",
          "What is the ugliest language?"
        ]
      },
      {
        id: 7,
        questions: [
          "What country is on your bucket list?",
          "What country would you never want to visit?",
          "What country would you never want to go back to?",
          "What country has the meanest people?",
          "What country has the hottest women?",
          "What country has the most beautiful scenery?",
          "What country has a bad future?",
          "What country generally has the best Eurovision entries?"
        ]
      },
      {
        id: 8,
        questions: [
          "What is the best biome in Minecraft?",
          "What is the ugliest biome in Minecraft?"
        ]
      },
      {
        id: 9,
        questions: [
          "What is the most nostalgic song?",
          "What song is overrated?",
          "What song do you listen to the most?",
          "What is the worst song of all time?",
          "What song is overhated?",
          "What is the most annoying internet song?"
        ]
      },
      {
        id: 10,
        questions: [
          "Who was the most memorable person from Ressu middle school (not one of us)?",
          "Who was the most studious person from Ressu middle school?",
          "Who was the least desirable person to hang out with from Ressu middle school?"
        ]
      },
      {
        id: 11,
        questions: [
          "How much money for you to eat 1 glass of Sushnevningiluzuzombuzva?",
          "What is the most money you would spend on a wedding?",
          "What yearly income should be “middle class” in a developed country?",
          "What is the most you would pay for university (per year)?",
          "What is the most money you would spend on a car?"
        ]
      },
      {
        id: 12,
        questions: [
          "What airline is the best (price, quality etc.)?",
          "What airline is the worst?",
          "What airline is the most luxurious?",
          "What airline do you use the most often?"
        ]
      },
      {
        id: 13,
        questions: [
          "What is the most boring subject?",
          "What subject had the worst teacher in Ressu middle school?",
          "What is the most fun subject?",
          "What is the easiest subject?",
          "What is the hardest subject?",
          "What is the most useless subject?"
        ]
      },
      {
        id: 14,
        questions: [
          "What is the best car?",
          "What is the worst car?"
        ]
      }
    ];

    let uid = DEFAULT_GROUPS.length + 1;
    const genCode = () => Math.random().toString(36).slice(2, 6).toUpperCase();

    // ── Styles ──────────────────────────────────────────────────────────────────
    const C = {
      bg:"#0a0a14", bg2:"#1a1f2e", bg3:"#111827",
      ind:"#818cf8", ind2:"#4f46e5", ind3:"#1e1b4b",
      grn:"#34d399", red:"#f87171", ylw:"#fbbf24",
      txt:"#fff", txt2:"#d1d5db", txt3:"#9ca3af", txt4:"#6b7280",
      bdr:"#2d3748", bdr2:"#374151",
    };
    const page = { minHeight:"100vh", background:C.bg, color:C.txt, padding:"1.5rem", maxWidth:"480px", margin:"0 auto", fontFamily:"system-ui,sans-serif", boxSizing:"border-box" };
    const ctr  = { ...page, display:"flex", flexDirection:"column", alignItems:"center", justifyContent:"center", maxWidth:"100vw", textAlign:"center" };
    const btn  = (on=true, bg=C.ind2) => ({ width:"100%", background:on?bg:C.bdr2, border:"none", borderRadius:"1rem", padding:"1.1rem", color:C.txt, fontWeight:"700", fontSize:"1.05rem", cursor:on?"pointer":"not-allowed", opacity:on?1:0.5, transition:"opacity 0.15s" });
    const inp  = { width:"100%", background:C.bg2, border:`1px solid ${C.bdr}`, borderRadius:"0.875rem", padding:"0.875rem", color:C.txt, fontSize:"1rem", outline:"none", boxSizing:"border-box" };
    const card = (bdr=C.bdr, bg=C.bg2) => ({ background:bg, border:`1px solid ${bdr}`, borderRadius:"1rem", padding:"1rem" });
    const lbl  = { fontSize:"0.7rem", textTransform:"uppercase", letterSpacing:"0.07em", color:C.txt4, marginBottom:"0.4rem", display:"block" };

    function Chip({ name, done, isMe }) {
      return (
        <span style={{ background:C.bg2, border:`1px solid ${done ? "#059669" : isMe ? C.ind : C.bdr}`, borderRadius:"9999px", padding:"0.35rem 0.8rem", fontSize:"0.8rem", color:done ? C.grn : isMe ? "#c7d2fe" : C.txt4 }}>
          {done ? "✓ " : "⏳ "}{name}{isMe ? " (you)" : ""}
        </span>
      );
    }

    function WaitCard({ host }) {
      return (
        <div style={{ ...card(), textAlign:"center", padding:"1.25rem" }}>
          <p style={{ color:C.txt3, margin:0 }}>⏳ Waiting for <strong style={{ color:C.ind }}>{host}</strong>…</p>
        </div>
      );
    }

    function App() {
      const [scr, setScr]           = useState("landing");
      const [myName, setMyName]     = useState("");
      const [roomCode, setRoomCode] = useState("");
      const [isHost, setIsHost]     = useState(false);
      const [gs, setGs]             = useState(null);

      // per-round local
      const [myAns, setMyAns]   = useState("");
      const [myVote, setMyVote] = useState("");
      const [submitted, setSub] = useState(false);
      const [voted, setVoted]   = useState(false);
      const [timeLeft, setTimeLeft] = useState(15);

      // forms
      const [hostName, setHostName] = useState("");
      const [joinName, setJoinName] = useState("");
      const [joinCode, setJoinCode] = useState("");
      const [groups, setGroups]     = useState(DEFAULT_GROUPS);
      const [showGF, setShowGF]     = useState(false);
      const [customQuestions, setCustomQuestions] = useState("");
      const [err, setErr]           = useState("");

      // ── Poll ──────────────────────────────────────────────────────────────────
      useEffect(() => {
        if (!roomCode || scr !== "game") return;
        const poll = async () => {
          try {
            const r = await window.storage.get(`room:${roomCode}`);
            if (r && r.value) setGs(JSON.parse(r.value));
          } catch {}
        };
        poll();
        const t = setInterval(poll, 1500);
        return () => clearInterval(t);
      }, [roomCode, scr]);

      // Local countdown loop for the Voting phase timer
      useEffect(() => {
        if (!gs || gs.phase !== "voting" || !gs.timerEnd) return;
        
        const interval = setInterval(() => {
          const now = Date.now();
          const rem = Math.max(0, Math.ceil((gs.timerEnd - now) / 1000));
          setTimeLeft(rem);

          // Force transition immediately to results when countdown hits 0
          if (rem <= 0) {
            clearInterval(interval);
            // Any client can trigger the transition safely once local time expires
            update({ phase: "results" });
          }
        }, 200);

        return () => clearInterval(interval);
      }, [gs?.phase, gs?.timerEnd]);

      // reset local state on phase change
      useEffect(() => {
        if (!gs || !myName) return;
        if (gs.phase === "answering") {
          if (gs.answers[myName] != null) setSub(true);
          else { setSub(false); setMyAns(""); }
        }
        if (gs.phase === "voting") {
          if (gs.votes[myName] != null) setVoted(true);
          else { setVoted(false); setMyVote(""); }
        }
      }, [gs?.phase, myName]);

      // ── Storage update ────────────────────────────────────────────────────────
      const update = useCallback(async (fn) => {
        try {
          const r = await window.storage.get(`room:${roomCode}`);
          if (!r || !r.value) return;
          const cur  = JSON.parse(r.value);
          const next = typeof fn === "function" ? fn(cur) : { ...cur, ...fn };
          await window.storage.set(`room:${roomCode}`, JSON.stringify(next));
          setGs(next);
        } catch (e) { console.error(e); }
      }, [roomCode]);

      // ── Handlers ──────────────────────────────────────────────────────────────
      const createRoom = async () => {
        if (!hostName.trim() || groups.length === 0) return;
        const code = genCode();
        const state = { phase:"lobby", players:[hostName.trim()], host:hostName.trim(), impIdx:null, crewQ:"", impQ:"", answers:{}, votes:{}, qGroups:groups, revealIndex:0, readyPlayers:[] };
        const ok = await window.storage.set(`room:${code}`, JSON.stringify(state));
        if (ok) {
          setMyName(hostName.trim()); setRoomCode(code); setIsHost(true); setGs(state); setScr("game");
        }
      };

      const joinRoom = async () => {
        const name = joinName.trim(), code = joinCode.trim().toUpperCase();
        if (!name || code.length !== 4) return;
        try {
          const r = await window.storage.get(`room:${code}`);
          if (!r || !r.value) { setErr("Room not found."); return; }
          const state = JSON.parse(r.value);
          if (state.phase !== "lobby" && !state.players.includes(name)) { setErr("Game already started."); return; }
          let next = state;
          if (!state.players.includes(name)) {
            next = { ...state, players:[...state.players, name] };
            await window.storage.set(`room:${code}`, JSON.stringify(next));
          }
          setMyName(name); setRoomCode(code); setIsHost(state.host === name); setGs(next); setScr("game");
        } catch { setErr("Could not connect to room."); }
      };

      const startGame = async () => {
        const players = gs.players;
        const impIdx  = Math.floor(Math.random() * players.length);
        const targetGroup = gs.qGroups[Math.floor(Math.random() * gs.qGroups.length)];
        const shuffled = [...targetGroup.questions].sort(() => Math.random() - 0.5);
        const crewQ = shuffled[0] || "Answer honestly.";
        const impQ  = shuffled[1] || shuffled[0] || "Answer honestly.";

        const answers = Object.fromEntries(players.map(p => [p, null]));
        await update({ phase:"answering", impIdx, crewQ, impQ, answers, votes:{}, revealIndex:0, readyPlayers:[] });
        setSub(false); setMyAns("");
      };

      const submitAnswer = async () => {
        if (!myAns.trim()) return;
        await update(s => ({ ...s, answers:{ ...s.answers, [myName]:myAns.trim() } }));
        setSub(true);
      };

      const handleReadyToVote = async () => {
        if (gs.readyPlayers.includes(myName)) return;
        
        await update(s => {
          const updatedReady = [...s.readyPlayers, myName];
          const threshold = (2 / 3) * s.players.length;
          
          // Check if 2/3 or more players are ready
          if (updatedReady.length >= threshold) {
            const votes = Object.fromEntries(s.players.map(p => [p, null]));
            return {
              ...s,
              phase: "voting",
              readyPlayers: updatedReady,
              votes,
              timerEnd: Date.now() + 15000 // Set exact network epoch time for 15s limit
            };
          }
          return { ...s, readyPlayers: updatedReady };
        });
      };

      const submitVote = async () => {
        if (!myVote) return;
        await update(s => ({ ...s, votes:{ ...s.votes, [myName]:myVote } }));
        setVoted(true);
      };

      const advanceTo = async (phase) => {
        await update({ phase });
      };

      const advanceReveal = async () => {
        await update(s => ({ ...s, revealIndex: s.revealIndex + 1 }));
      };

      const playAgain = async () => {
        await update({ phase:"lobby", impIdx:null, crewQ:"", impQ:"", answers:{}, votes:{}, revealIndex:0, readyPlayers:[] });
        setSub(false); setVoted(false); setMyAns(""); setMyVote("");
      };

      // ── Computed ──────────────────────────────────────────────────────────────
      const allAnswered  = gs && gs.players.every(p => gs.answers[p] != null);
      const answeredN    = gs ? gs.players.filter(p => gs.answers[p] != null).length : 0;
      const votedN       = gs ? gs.players.filter(p => gs.votes[p]   != null).length : 0;
      const amImposter   = gs && gs.players[gs.impIdx] === myName;
      const myQ          = gs ? (amImposter ? gs.impQ : gs.crewQ) : "";
      
      const readyCount   = gs?.readyPlayers?.length || 0;
      const neededCount  = gs ? Math.ceil((2 / 3) * gs.players.length) : 0;
      const iAmReady     = gs?.readyPlayers?.includes(myName);

      function voteResults() {
        const t = Object.fromEntries(gs.players.map(p => [p,0]));
        Object.values(gs.votes).filter(Boolean).forEach(v => t[v]++);
        const max = Math.max(...Object.values(t));
        const top = gs.players.filter(p => t[p] === max);
        return { t, max, top };
      }

      // ── LANDING ───────────────────────────────────────────────────────────────
      if (scr === "landing") return (
        <div style={ctr}>
          <div style={{ fontSize:"4rem", marginBottom:"0.75rem" }}>🕵️</div>
          <h1 style={{ fontSize:"2.5rem", fontWeight:"900", color:C.ind, margin:"0 0 0.4rem 0" }}>Impostor</h1>
          <p style={{ color:C.txt4, fontSize:"0.9rem", marginBottom:"3rem", maxWidth:"260px", lineHeight:"1.5" }}>
            One player secretly gets a different question from the same group. Can the crew figure out who?
          </p>
          <div style={{ width:"100%", maxWidth:"300px", display:"flex", flexDirection:"column", gap:"0.75rem" }}>
            <button onClick={() => setScr("hosting")} style={btn()}>🏠 Host a Game</button>
            <button onClick={() => setScr("joining")} style={btn(true,"#059669")}>🔗 Join a Game</button>
          </div>
        </div>
      );

      // ── HOST SETUP ────────────────────────────────────────────────────────────
      if (scr === "hosting") return (
        <div style={{ ...page, paddingTop:"2rem" }}>
          <button onClick={() => setScr("landing")} style={{ background:"none", border:"none", color:C.txt4, cursor:"pointer", padding:0, marginBottom:"1.25rem", fontSize:"0.9rem" }}>← Back</button>
          <h1 style={{ fontSize:"1.75rem", fontWeight:"800", color:C.ind, margin:"0 0 1.75rem 0" }}>Host a Game</h1>

          <div style={{ marginBottom:"1.5rem" }}>
            <label style={lbl}>Your name</label>
            <input style={inp} placeholder="Enter your name…" value={hostName} onChange={e => setHostName(e.target.value)} onKeyDown={e => e.key==="Enter" && createRoom()} autoFocus />
          </div>

          <div style={{ marginBottom:"2rem" }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"0.75rem" }}>
              <label style={{ ...lbl, margin:0 }}>Question Groups ({groups.length})</label>
              <button onClick={() => setShowGF(!showGF)} style={{ background:"none", border:"none", color:C.ind, cursor:"pointer", fontSize:"0.8rem" }}>{showGF ? "Cancel" : "+ Add custom group"}</button>
            </div>
            {showGF && (
              <div style={{ ...card(), marginBottom:"0.75rem" }}>
                <label style={{ fontSize:"0.72rem", color:C.grn, display:"block", marginBottom:"0.25rem" }}>📝 Custom Group Questions (One per line)</label>
                <textarea style={{ ...inp, resize:"none", fontSize:"0.875rem", marginBottom:"0.75rem" }} rows={4} placeholder="Question 1&#10;Question 2&#10;Question 3..." value={customQuestions} onChange={e => setCustomQuestions(e.target.value)} />
                <button onClick={() => {
                  const splitLines = customQuestions.split("\n").map(l => l.trim()).filter(Boolean);
                  if (splitLines.length < 2) { alert("Please provide at least 2 questions for a group!"); return; }
                  setGroups(g => [...g, { id:uid++, questions:splitLines }]);
                  setCustomQuestions(""); setShowGF(false);
                }} style={{ ...btn(customQuestions.trim()), padding:"0.7rem", fontSize:"0.9rem" }}>Save Group</button>
              </div>
            )}
            <div style={{ maxHeight:"14rem", overflowY:"auto", display:"flex", flexDirection:"column", gap:"0.5rem" }}>
              {groups.map((g, i) => (
                <div key={g.id} style={card()}>
                  <div style={{ display:"flex", gap:"0.5rem" }}>
                    <div style={{ flex:1 }}>
                      <p style={{ fontSize:"0.75rem", color:C.ind, margin:"0 0 4px 0", fontWeight:"700" }}>📦 Group #{i+1} ({g.questions.length} options)</p>
                      {g.questions.map((q, qidx) => (
                        <p key={qidx} style={{ fontSize:"0.68rem", color:C.txt3, margin:"0 0 2px 0", whiteSpace:"nowrap", overflow:"hidden", textOverflow:"ellipsis" }}>• {q}</p>
                      ))}
                    </div>
                    <button onClick={() => setGroups(gs => gs.filter(x => x.id!==g.id))} style={{ background:"none", border:"none", color:C.txt4, cursor:"pointer", fontSize:"1.2rem", lineHeight:1 }}>×</button>
                  </div>
                </div>
              ))}
            </div>
          </div>
          <button onClick={createRoom} disabled={!hostName.trim()||groups.length===0} style={btn(!!hostName.trim()&&groups.length>0)}>Create Room 🏠</button>
        </div>
      );

      // ── JOIN ──────────────────────────────────────────────────────────────────
      if (scr === "joining") return (
        <div style={ctr}>
          <button onClick={() => { setScr("landing"); setErr(""); }} style={{ position:"absolute", top:"1.5rem", left:"1.5rem", background:"none", border:"none", color:C.txt4, cursor:"pointer" }}>← Back</button>
          <div style={{ fontSize:"3rem", marginBottom:"0.75rem" }}>🔗</div>
          <h1 style={{ fontSize:"1.75rem", fontWeight:"800", color:C.ind, margin:"0 0 2rem 0" }}>Join a Game</h1>
          <div style={{ width:"100%", maxWidth:"300px" }}>
            <div style={{ marginBottom:"1rem" }}>
              <label style={lbl}>Your name</label>
              <input style={inp} placeholder="Enter your name…" value={joinName} onChange={e => setJoinName(e.target.value)} autoFocus />
            </div>
            <div style={{ marginBottom:"1.5rem" }}>
              <label style={lbl}>Room code</label>
              <input style={{ ...inp, textTransform:"uppercase", fontSize:"2rem", textAlign:"center", letterSpacing:"0.3em", fontWeight:"800" }} placeholder="XXXX" maxLength={4} value={joinCode} onChange={e => setJoinCode(e.target.value.toUpperCase())} onKeyDown={e => e.key==="Enter" && joinRoom()} />
            </div>
            {err && <p style={{ color:C.red, fontSize:"0.875rem", marginBottom:"1rem" }}>⚠ {err}</p>}
            <button onClick={joinRoom} disabled={!joinName.trim()||joinCode.length!==4} style={btn(!!joinName.trim()&&joinCode.length===4,"#059669")}>Join Game →</button>
          </div>
        </div>
      );

      // ── GAME ──────────────────────────────────────────────────────────────────
      if (scr === "game" && gs) {
        const { phase, players, host, impIdx, crewQ, impQ, answers, votes, revealIndex = 0 } = gs;
        const impName = players[impIdx];
        const iAmHost = myName === host;

        // LOBBY
        if (phase === "lobby") {
          const addCustomGroup = () => {
            const splitLines = customQuestions.split("\n").map(l => l.trim()).filter(Boolean);
            if (splitLines.length < 2) return;
            update(s => ({ ...s, qGroups:[...s.qGroups, { id:uid++, questions:splitLines }] }));
            setCustomQuestions(""); setShowGF(false);
          };
          return (
            <div style={{ ...page, paddingTop:"2rem" }}>
              <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", marginBottom:"2rem" }}>
                <div>
                  <p style={{ color:C.txt4, fontSize:"0.8rem", margin:"0 0 0.2rem 0" }}>Room code</p>
                  <h2 style={{ color:C.ind, fontSize:"2.75rem", fontWeight:"900", letterSpacing:"0.25em", margin:0 }}>{roomCode}</h2>
                  <p style={{ color:"#374151", fontSize:"0.72rem", marginTop:"0.2rem" }}>Share this with your friends</p>
                </div>
                <span style={{ fontSize:"0.72rem", color:iAmHost?C.ylw:C.txt4, background:C.bg2, borderRadius:"9999px", padding:"0.3rem 0.75rem", border:`1px solid ${iAmHost?"#92400e":C.bdr}` }}>
                  {iAmHost ? "👑 Host" : "👤 Player"}
                </span>
              </div>

              <div style={{ marginBottom:"1.5rem" }}>
                <label style={lbl}>Players ({players.length})</label>
                <div style={{ display:"flex", flexWrap:"wrap", gap:"0.5rem" }}>
                  {players.map(p => (
                    <span key={p} style={{ background:C.bg2, border:`1px solid ${p===myName?C.ind:C.bdr}`, borderRadius:"9999px", padding:"0.35rem 0.85rem", fontSize:"0.85rem", color:p===myName?"#c7d2fe":C.txt2 }}>
                      {p===host?"👑 ":""}{p}{p===myName?" (you)":""}
                    </span>
                  ))}
                </div>
                {players.length < 3 && <p style={{ color:C.ylw, fontSize:"0.75rem", marginTop:"0.5rem" }}>⚠ Need at least 3 players to start</p>}
              </div>

              {iAmHost && (
                <div style={{ marginBottom:"2rem" }}>
                  <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"0.75rem" }}>
                    <label style={{ ...lbl, margin:0 }}>Groups ({gs.qGroups.length} Pools)</label>
                    <button onClick={() => setShowGF(!showGF)} style={{ background:"none", border:"none", color:C.ind, cursor:"pointer", fontSize:"0.8rem" }}>{showGF?"Cancel":"+ Add custom group"}</button>
                  </div>
                  {showGF && (
                    <div style={{ ...card(), marginBottom:"0.75rem" }}>
                      <label style={{ fontSize:"0.72rem", color:C.grn, display:"block", marginBottom:"0.25rem" }}>📝 Group Questions (One per line)</label>
                      <textarea style={{ ...inp, resize:"none", fontSize:"0.875rem", marginBottom:"0.75rem" }} rows={3} value={customQuestions} onChange={e => setCustomQuestions(e.target.value)} placeholder="Question 1&#10;Question 2..." />
                      <button onClick={addCustomGroup} style={{ ...btn(customQuestions.trim()), padding:"0.7rem", fontSize:"0.9rem" }}>Save Group</button>
                    </div>
                  )}
                  <div style={{ maxHeight:"10rem", overflowY:"auto", display:"flex", flexDirection:"column", gap:"0.5rem" }}>
                    {gs.qGroups.map((g, idx) => (
                      <div key={g.id} style={card()}>
                        <div style={{ display:"flex", gap:"0.5rem" }}>
                          <div style={{ flex:1 }}>
                            <p style={{ fontSize:"0.68rem", color:C.ind, margin:"0 0 2px 0", fontWeight:"700" }}>📦 Group #{idx+1}</p>
                            {g.questions.map((q, qidx) => (
                              <p key={qidx} style={{ fontSize:"0.65rem", color:C.txt3, margin:0 }}>• {q}</p>
                            ))}
                          </div>
                          <button onClick={() => update(s => ({ ...s, qGroups:s.qGroups.filter(x => x.id!==g.id) }))} style={{ background:"none", border:"none", color:C.txt4, cursor:"pointer", fontSize:"1.2rem", lineHeight:1 }}>×</button>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>
              )}

              {iAmHost
                ? <button onClick={startGame} disabled={players.length<3||gs.qGroups.length===0} style={btn(players.length>=3&&gs.qGroups.length>0)}>Start Game 🚀</button>
                : <WaitCard host={host} />
              }
            </div>
          );
        }

        // ANSWERING
        if (phase === "answering") {
          if (submitted) return (
            <div style={ctr}>
              <div style={{ fontSize:"3rem", marginBottom:"0.75rem" }}>✅</div>
              <h2 style={{ color:C.grn, fontSize:"1.5rem", fontWeight:"700", margin:"0 0 0.5rem 0" }}>Answer submitted!</h2>
              <p style={{ color:C.txt3, marginBottom:"2rem" }}>Waiting for others… ({answeredN}/{players.length})</p>
              <div style={{ display:"flex", flexWrap:"wrap", gap:"0.5rem", justifyContent:"center", maxWidth:"320px" }}>
                {players.map(p => <Chip key={p} name={p} done={answers[p]!=null} isMe={p===myName} />)}
              </div>
              {iAmHost && allAnswered && (
                <button onClick={() => advanceTo("reveal")} style={{ ...btn(), width:"auto", padding:"0.9rem 2rem", marginTop:"2rem", fontSize:"1rem" }}>
                  Reveal Answers 📋
                </button>
              )}
              {!iAmHost && allAnswered && <p style={{ color:C.txt4, fontSize:"0.8rem", marginTop:"1.5rem" }}>All answers in! Waiting for {host} to reveal…</p>}
            </div>
          );
          return (
            <div style={{ ...page, paddingTop:"2rem" }}>
              <p style={{ color:C.txt4, fontSize:"0.875rem", margin:"0 0 0.2rem 0" }}>Question for</p>
              <h2 style={{ color:C.ind, fontSize:"1.75rem", fontWeight:"800", margin:"0 0 2rem 0" }}>{myName}</h2>
              <div style={{ background:"#1a1a2e", border:`1px solid ${C.ind3}`, borderRadius:"1.25rem", padding:"1.5rem", marginBottom:"1.5rem" }}>
                <p style={{ fontSize:"1.1rem", lineHeight:"1.65", color:"#e0e7ff", margin:0 }}>{myQ}</p>
              </div>
              <label style={lbl}>Your answer</label>
              <textarea style={{ ...inp, resize:"none", marginBottom:"1rem" }} rows={4} placeholder="Type your answer…" value={myAns} onChange={e => setMyAns(e.target.value)} autoFocus />
              <button onClick={submitAnswer} disabled={!myAns.trim()} style={btn(!!myAns.trim())}>Submit Answer ✓</button>
            </div>
          );
        }

        // REVEAL PHASE WITH 2/3 PROGRESSIVE VOTING OVERRIDE
        if (phase === "reveal") {
          const hasMoreToReveal = revealIndex < players.length;

          return (
            <div style={{ ...page, paddingTop:"2rem" }}>
              <div style={{ textAlign:"center", marginBottom:"1.75rem" }}>
                <div style={{ fontSize:"2rem", marginBottom:"0.5rem" }}>👀</div>
                <h1 style={{ fontSize:"1.75rem", fontWeight:"800", margin:0 }}>Revealing Answers</h1>
                <p style={{ color:C.txt4, fontSize:"0.875rem", marginTop:"0.25rem" }}>
                  {hasMoreToReveal ? `Showing ${revealIndex} of ${players.length} responses...` : "All answers revealed! Discuss!"}
                </p>
              </div>

              <div style={{ background:"#064e3b22", border:"1px solid #059669", borderRadius:"1rem", padding:"1rem", marginBottom:"1.5rem" }}>
                <p style={{ fontSize:"0.68rem", color:C.grn, margin:"0 0 6px 0", textTransform:"uppercase", letterSpacing:"0.07em" }}>👥 The Crewmate Question</p>
                <p style={{ color:C.txt, fontWeight:"500", margin:0 }}>{crewQ}</p>
              </div>

              <div style={{ display:"flex", flexDirection:"column", gap:"0.75rem", marginBottom:"2rem" }}>
                {players.slice(0, revealIndex).map((p, idx) => (
                  <div 
                    key={p} 
                    className="dramatic-card"
                    style={card(C.ind, "#131826")}
                  >
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:"6px" }}>
                      <p style={{ fontSize:"0.85rem", fontWeight:"700", color:C.ind, margin:0 }}>{p}{p===myName?" (you)":""}</p>
                      <span style={{ fontSize:"0.65rem", color:C.txt4, background:C.bg3, padding:"2px 8px", borderRadius:"4px" }}>
                        Response #{idx + 1}
                      </span>
                    </div>
                    <p style={{ color:C.txt, margin:0, fontSize:"1.05rem", lineHeight:"1.5" }}>{answers[p] ?? "(no answer)"}</p>
                  </div>
                ))}

                {revealIndex === 0 && (
                  <div style={{ ...card(), textAlign:"center", padding:"2rem", borderStyle:"dashed", borderColor:C.bdr2 }}>
                    <p style={{ color:C.txt4, margin:0, fontSize:"0.95rem" }}>🎭 Waiting for host to reveal cards...</p>
                  </div>
                )}
              </div>

              {/* Host Control: Step through slideshow entries */}
              {iAmHost && hasMoreToReveal && (
                <button onClick={advanceReveal} style={{ ...btn(true, C.ind2), marginBottom: "1rem" }}>
                  Reveal Next Answer ✨ ({revealIndex + 1}/{players.length})
                </button>
              )}

              {/* Global democratic choice: Anyone can initiate voting when 2/3 agree */}
              <div style={{ ...card(iAmReady ? "#059669" : C.bdr), textAlign:"center" }}>
                <p style={{ fontSize:"0.85rem", color:C.txt2, marginTop:0, marginBottom:"0.75rem" }}>
                  🗳️ Ready to vote? ({readyCount}/{neededCount} players agreed)
                </p>
                <button 
                  onClick={handleReadyToVote} 
                  disabled={iAmReady}
                  style={btn(!iAmReady, iAmReady ? C.bdr2 : "#059669")}
                >
                  {iAmReady ? "Waiting for 2/3 threshold..." : "I'm Ready to Vote! 🔒"}
                </button>
              </div>
            </div>
          );
        }

        // VOTING PHASE WITH 15S AUTOMATED COUNTDOWN
        if (phase === "voting") {
          return (
            <div style={{ ...page, paddingTop:"2rem" }}>
              {/* Dynamic 15s Countdown Header */}
              <div style={{ textAlign:"center", marginBottom:"1.5rem", background:"#450a0a44", border:`1px solid ${C.red}`, padding:"0.75rem", borderRadius:"1rem" }}>
                <p style={{ color:C.red, fontSize:"0.75rem", textTransform:"uppercase", letterSpacing:"0.1em", margin:"0 0 2px 0", fontWeight:"700" }}>🚨 Voting finishes automatically in:</p>
                <h2 style={{ color:C.txt, fontSize:"2.25rem", fontWeight:"900", margin:0 }}>{timeLeft}s</h2>
              </div>

              {voted ? (
                <div style={{ textAlign:"center", padding:"2rem 0" }}>
                  <div style={{ fontSize:"3rem", marginBottom:"0.75rem" }}>🔒</div>
                  <h2 style={{ color:C.ind, fontSize:"1.5rem", fontWeight:"700", margin:"0 0 0.5rem 0" }}>Vote locked in!</h2>
                  <p style={{ color:C.txt3, marginBottom:"2rem" }}>Players responded: ({votedN}/{players.length})</p>
                  <div style={{ display:"flex", flexWrap:"wrap", gap:"0.5rem", justifyContent:"center", maxWidth:"320px" }}>
                    {players.map(p => <Chip key={p} name={p} done={votes[p]!=null} isMe={p===myName} />)}
                  </div>
                </div>
              ) : (
                <div>
                  <h2 style={{ color:C.ind, fontSize:"1.75rem", fontWeight:"800", margin:"0 0 0.25rem 0" }}>Your Vote</h2>
                  <p style={{ color:C.txt4, fontSize:"0.875rem", marginBottom:"1.5rem" }}>Who do you think got a different question?</p>
                  <div style={{ display:"flex", flexDirection:"column", gap:"0.625rem", marginBottom:"2rem" }}>
                    {players.filter(p => p!==myName).map(p => (
                      <button key={p} onClick={() => setMyVote(p)} style={{ textAlign:"left", padding:"1rem", borderRadius:"1rem", border:`2px solid ${myVote===p?C.ind:C.bdr}`, background:myVote===p?C.ind3:C.bg2, color:C.txt, fontSize:"1rem", fontWeight:"500", cursor:"pointer" }}>
                        {myVote===p?"✓ ":""}{p}
                      </button>
                    ))}
                  </div>
                  <button onClick={submitVote} disabled={!myVote} style={btn(!!myVote)}>Lock In Vote 🔒</button>
                </div>
              )}
            </div>
          );
        }

        // RESULTS
        if (phase === "results") {
          const { t: tally, top } = voteResults();
          const caught = top.includes(impName) && top.length===1;
          const isTie  = top.length > 1;
          const emoji  = caught?"🎉":isTie?"🤝":"😈";
          const title  = caught?"Impostor Caught!":isTie?"It's a Tie — Impostor Escapes!":"Impostor Wins!";
          const col    = caught?C.grn:isTie?C.ylw:C.red;
          return (
            <div style={{ ...page, paddingTop:"2rem" }}>
              <div style={{ textAlign:"center", marginBottom:"2rem" }}>
                <div style={{ fontSize:"4rem", marginBottom:"0.75rem" }}>{emoji}</div>
                <h1 style={{ fontSize:"1.875rem", fontWeight:"800", color:col, margin:"0 0 0.5rem 0" }}>{title}</h1>
                <p style={{ color:C.txt3, fontSize:"0.875rem" }}>
                  {caught?`The crew correctly identified ${impName}!`:isTie?"No consensus — the impostor slipped away!":`${impName} blended in perfectly!`}
                </p>
              </div>

              <h3 style={{ fontSize:"0.68rem", color:C.txt4, textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:"0.75rem" }}>Vote Count</h3>
              <div style={{ display:"flex", flexDirection:"column", gap:"0.5rem", marginBottom:"1.5rem" }}>
                {Object.entries(tally).sort((a,b)=>b[1]-a[1]).map(([name, count]) => {
                  const isImp = name===impName;
                  return (
                    <div key={name} style={{ display:"flex", alignItems:"center", justifyContent:"space-between", padding:"0.875rem 1rem", borderRadius:"0.875rem", background:isImp?"#1a0505":C.bg2, border:isImp?`1px solid ${C.red}`:`1px solid ${C.bdr}` }}>
                      <span style={{ fontWeight:"500" }}>
                        {name}{name===myName?" (you)":""} {isImp && <span style={{ color:C.red, fontSize:"0.72rem" }}>🕵️ IMPOSTOR</span>}
                      </span>
                      <span style={{ fontWeight:"700", color:top.includes(name)&&count>0?C.ylw:C.txt4 }}>
                        {count} vote{count!==1?"s":""}
                      </span>
                    </div>
                  );
                })}
              </div>

              <h3 style={{ fontSize:"0.68rem", color:C.txt4, textTransform:"uppercase", letterSpacing:"0.07em", marginBottom:"0.75rem" }}>The Questions Discovered</h3>
              <div style={{ display:"flex", flexDirection:"column", gap:"0.5rem", marginBottom:"2rem" }}>
                <div style={{ background:"#064e3b22", border:"1px solid #059669", borderRadius:"0.875rem", padding:"1rem" }}>
                  <p style={{ fontSize:"0.68rem", color:C.grn, margin:"0 0 6px 0" }}>👥 Crewmate question</p>
                  <p style={{ color:C.txt, margin:0 }}>{crewQ}</p>
                </div>
                <div style={{ background:"#450a0a33", border:"1px solid #dc2626", borderRadius:"0.875rem", padding:"1rem" }}>
                  <p style={{ fontSize:"0.68rem", color:C.red, margin:"0 0 6px 0" }}>🕵️ Impostor question ({impName})</p>
                  <p style={{ color:C.txt, margin:0 }}>{impQ}</p>
                </div>
              </div>

              {iAmHost
                ? <button onClick={playAgain} style={btn()}>Play Again 🔄</button>
                : <WaitCard host={host} />
              }
            </div>
          );
        }
      }

      return <div style={ctr}><p style={{ color:C.txt3 }}>⏳ Connecting…</p></div>;
    }

    const container = document.getElementById('root');
    const root = ReactDOM.createRoot(container);
    root.render(<App />);
  </script>
</body>
</html>
